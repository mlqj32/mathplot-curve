          const { polarity, threshold } = resolveContourPolarity(gray, w, h, 'auto', threshSlider);
          pushGrayMask(gray, polarity, threshold, 'invert-gray');
          if (threshSlider > 0) {
            const otsuT = computeOtsuThreshold(gray);
            pushGrayMask(gray, polarity, otsuT, 'invert-gray-otsu');
          }
        }
        const band = Math.max(2, Math.round(Math.min(w, h) * 0.04));
        const border = sampleBorderRgb(rawData, w, h, band);
        const invR = 255 - border.r, invG = 255 - border.g, invB = 255 - border.b;
        const colorTh = effectiveColorThreshold(threshSlider, rawData, w, h, invR, invG, invB);
        const invMask = new Uint8Array(w * h);
        for (let j = 0, i = 0; j < w * h; j++, i += 4) {
          const pr = 255 - rawData[i], pg = 255 - rawData[i + 1], pb = 255 - rawData[i + 2];
          const dr = pr - invR, dg = pg - invG, db = pb - invB;
          const dist = Math.sqrt(dr * dr + dg * dg + db * db);
          invMask[j] = dist > colorTh ? 1 : 0;
        }
        pushAttempt(invMask, 'colorDist', colorTh, false, 'invert-color');
      }

      if (bgMode === 'alpha') {
        const autoTh = computeOtsuThresholdAlpha(rawData);
        if (threshSlider > 0) pushAlpha(threshSlider, 'alpha');
        else pushAlpha(autoTh, 'alpha');
        for (const th of [32, 16, 8, 64, 128, 4]) {
          if (threshSlider > 0 && th === threshSlider) continue;
          pushAlpha(th, 'alpha');
        }
      }

      let best = null;
      let bestScore = -1;
      let hollowFallback = null;
      let hollowScore = -1;
      for (const attempt of attempts) {
        let mask = processContourMask(attempt.mask, w, h, attempt.isAlpha);
        mask = keepLargestComponent(mask, w, h);
        const pixelPts = traceOuterContour(mask, w, h);
        const hollow = isHollowSilhouette(mask, w, h);
        const score = scoreContourAttempt(mask, pixelPts, w, h, attempt.method, analysis);
        const entry = {
          mask, pixelPts,
          polarity: attempt.polarity,
          threshold: attempt.threshold,
          method: attempt.method,
          analysis
        };
        if (hollow && pixelPts.length >= 8 && score <= -1) {
          const hs = pixelPts.length + (hollow ? 0 : 500);
          if (hs > hollowScore) { hollowScore = hs; hollowFallback = entry; }
          continue;
        }
        if (score > bestScore) {
          bestScore = score;
          best = entry;
        }
      }
      const picked = best || hollowFallback;
      return picked && picked.pixelPts.length >= 8 ? picked : null;
    }

    function keepLargestComponent(mask, w, h) {
      const labels = new Int32Array(mask.length);
      let nextLabel = 1;
      let bestLabel = 0, bestSize = 0;
      const sizes = [0];
      const stack = [];

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = contourIdx(x, y, w);
          if (!mask[i] || labels[i]) continue;
          const label = nextLabel++;
          let size = 0;
          stack.push(x, y);
          labels[i] = label;
          while (stack.length) {
            const cy = stack.pop();
            const cx = stack.pop();
            size++;
            const neigh = [[1, 0], [-1, 0], [0, 1], [0, -1]];
            for (const [dx, dy] of neigh) {
              const nx = cx + dx, ny = cy + dy;
              if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
              const ni = contourIdx(nx, ny, w);
              if (!mask[ni] || labels[ni]) continue;
              labels[ni] = label;
              stack.push(nx, ny);
            }
          }
          sizes[label] = size;
          if (size > bestSize) { bestSize = size; bestLabel = label; }
        }
      }
      const out = new Uint8Array(mask.length);
      if (!bestLabel) return out;
      for (let i = 0; i < labels.length; i++) {
        out[i] = labels[i] === bestLabel ? 1 : 0;
      }
      return out;
    }

    function traceOuterContour(mask, w, h) {
      let sx = -1, sy = -1;
      outer: for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          if (mask[contourIdx(x, y, w)]) { sx = x; sy = y; break outer; }
        }
      }
      if (sx < 0) return [];

      const dx = [1, 1, 0, -1, -1, -1, 0, 1];
      const dy = [0, 1, 1, 1, 0, -1, -1, -1];
      const pts = [];
      let x = sx, y = sy, dir = 0;
      const maxSteps = w * h * 4;
      for (let step = 0; step < maxSteps; step++) {
        pts.push({ x, y });
        let found = false;
        for (let k = 0; k < 8; k++) {
          const nd = (dir + k) % 8;
          const nx = x + dx[nd], ny = y + dy[nd];
          if (nx >= 0 && nx < w && ny >= 0 && ny < h && mask[contourIdx(nx, ny, w)]) {
            x = nx; y = ny;
            dir = (nd + 6) % 8;
            found = true;
            break;
          }
        }
        if (!found) break;
        if (pts.length > 3 && x === sx && y === sy) break;
      }
      return pts;
    }

    function perpendicularDistance(p, a, b) {
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy);
      if (len < 1e-12) return Math.hypot(p.x - a.x, p.y - a.y);
      return Math.abs(dy * p.x - dx * p.y + b.x * a.y - b.y * a.x) / len;
    }

    function douglasPeucker(points, epsilon) {
      if (points.length <= 2 || epsilon <= 0) return points.slice();
      let maxD = 0, idx = 0;
      const end = points.length - 1;
      for (let i = 1; i < end; i++) {
        const d = perpendicularDistance(points[i], points[0], points[end]);
        if (d > maxD) { maxD = d; idx = i; }
      }
      if (maxD <= epsilon) return [points[0], points[end]];
      const left = douglasPeucker(points.slice(0, idx + 1), epsilon);
      const right = douglasPeucker(points.slice(idx), epsilon);
      return left.slice(0, -1).concat(right);
    }

    /** 沿闭合折线按弧长均匀重采样，供样条插值 */
    function resampleClosedUniform(points, targetCount) {
      if (points.length < 3 || targetCount < 3) return points.slice();
      const n = points.length;
      const cum = [0];
      for (let i = 0; i < n; i++) {
        const j = (i + 1) % n;
        cum.push(cum[i] + Math.hypot(points[j].x - points[i].x, points[j].y - points[i].y));
      }
      const total = cum[n];
      if (total < 1e-12) return points.slice();
      const out = [];
      for (let k = 0; k < targetCount; k++) {
        let d = (k / targetCount) * total;
        let i = 0;
        while (i < n - 1 && cum[i + 1] < d) i++;
        const segStart = cum[i];
        const segEnd = cum[i + 1];
        const len = segEnd - segStart;
        const frac = len > 1e-12 ? (d - segStart) / len : 0;
        const a = points[i];
        const b = points[(i + 1) % n];
        out.push({ x: a.x + (b.x - a.x) * frac, y: a.y + (b.y - a.y) * frac });
      }
      return out;
    }

    function chaikinClosed(points, iterations) {
      let pts = points;
      for (let it = 0; it < iterations; it++) {
        const next = [];
        const n = pts.length;
        if (n < 3) return pts;
        for (let i = 0; i < n; i++) {
          const p0 = pts[i];
          const p1 = pts[(i + 1) % n];
          next.push(
            { x: 0.75 * p0.x + 0.25 * p1.x, y: 0.75 * p0.y + 0.25 * p1.y },
            { x: 0.25 * p0.x + 0.75 * p1.x, y: 0.25 * p0.y + 0.75 * p1.y }
          );
        }
        pts = next;
      }
      return pts;
    }

    function polylinePerimeter(points, closed) {
      let len = 0;
      const n = points.length;
      if (n < 2) return 0;
      for (let i = 0; i < n - 1; i++) {
        len += Math.hypot(points[i + 1].x - points[i].x, points[i + 1].y - points[i].y);
      }
      if (closed && n > 2) {
        len += Math.hypot(points[0].x - points[n - 1].x, points[0].y - points[n - 1].y);
      }
      return len;
    }

    /** 沿闭合折线加密，避免绘制时只有折线而无曲线感 */
    function densifyClosedPolyline(points, maxSegLen) {
      if (points.length < 2 || maxSegLen <= 0) return points.slice();
      const out = [];
      const n = points.length;
      for (let i = 0; i < n; i++) {
        const a = points[i];
        const b = points[(i + 1) % n];
        out.push(a);
        const dx = b.x - a.x, dy = b.y - a.y;
        const seg = Math.hypot(dx, dy);
        if (seg <= maxSegLen) continue;
        const steps = Math.ceil(seg / maxSegLen);
        for (let s = 1; s < steps; s++) {
          const t = s / steps;
          out.push({ x: a.x + dx * t, y: a.y + dy * t });
        }
      }
      return out;
    }

    function pixelsToMathContour(pixelPts, w, h) {
      if (!pixelPts.length) return [];
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const p of pixelPts) {
        minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
      }
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      const scale = Math.max(maxX - minX, maxY - minY, 1);
      return pixelPts.map(p => ({
        x: ((p.x - cx) / scale) * IMAGE_CONTOUR_NORM_HALF,
        y: ((cy - p.y) / scale) * IMAGE_CONTOUR_NORM_HALF
      }));
    }

    /** 会话轮廓尺度：仅迁移旧版过小/过大曲线，已正常尺寸不再改动 */
    function upscaleLegacyImageContourCurve() {
      if (!imageContourCurve?.points?.length) return;
      const pts = imageContourCurve.points;
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
      for (const p of pts) {
        xMin = Math.min(xMin, p.x); xMax = Math.max(xMax, p.x);
        yMin = Math.min(yMin, p.y); yMax = Math.max(yMax, p.y);
      }
      const span = Math.max(xMax - xMin, yMax - yMin, 0);
      const targetSpan = IMAGE_CONTOUR_NORM_HALF * 2;
      if (span < 0.01) return;
      if (span >= targetSpan * 0.82 && span <= targetSpan * 1.25) return;
      const legacyTiny = span <= 5.5;
      const legacyHuge = span >= targetSpan * 1.35;
      if (!legacyTiny && !legacyHuge) return;
      const k = targetSpan / span;
      const scaled = pts.map(p => ({ x: p.x * k, y: p.y * k }));
      const c = buildArcLengthCurve(scaled, imageContourCurve.closed !== false);
      if (c) {
        imageContourCurve = c;
        imageContourCurve.tMin = 0;
        imageContourCurve.tMax = 1;
      }
    }

    function fmtParamCoord(v) {
      let s = (Math.round(v * 1e6) / 1e6).toFixed(6);
      s = s.replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
      return s;
    }

    const CONTOUR_EXPORT_SAMPLES = 400;
    const CONTOUR_FOURIER_HARMONICS = 48;

    function sampleContourKnots(curve, count) {
      const n = Math.max(2, count | 0);
      const knots = [];
      for (let i = 0; i < n; i++) {
        const t = n > 1 ? i / (n - 1) : 0;
        const p = sampleImageContour(curve, t);
        knots.push({ t, x: p.x, y: p.y });
      }
      return knots;
    }

    function fmtContourNum(v) {
      const r = Math.round(v * 1e6) / 1e6;
      if (Math.abs(r) < 1e-8) return null;
      let s = r.toFixed(6);
      s = s.replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
      return s;
    }

    /** 参数方程：TSV 点表，可直接导入 Excel / Python / MATLAB */
    function buildContourParametricExport(curve) {
      const knots = sampleContourKnots(curve, CONTOUR_EXPORT_SAMPLES);
      const rows = ['t\tx\ty'].concat(
        knots.map(k => `${fmtParamCoord(k.t)}\t${fmtParamCoord(k.x)}\t${fmtParamCoord(k.y)}`)
      );
      return { text: rows.join('\n') };
    }

    /** 标准方程：教科书式参数方程定义 + 全部结点 */
    function buildContourStandardExport(curve) {
      const knots = sampleContourKnots(curve, CONTOUR_EXPORT_SAMPLES);
      const closed = curve.closed !== false;
      const n = knots.length;
      const lines = [
        '标准参数方程（弧长参数化 · 分段线性插值）',
        '',
        '  P(t) = ( x(t), y(t) ),   t ∈ [0, 1]' + (closed ? '，闭合曲线' : ''),
        '',
        '  x(t) = x_k + (x_{k+1} - x_k) · (t - t_k) / (t_{k+1} - t_k),   t_k ≤ t < t_{k+1}',
        '  y(t) = y_k + (y_{k+1} - y_k) · (t - t_k) / (t_{k+1} - t_k),   t_k ≤ t < t_{k+1}',
        '',
        `  结点 k = 0, …, ${n - 1}：`,
        ''
      ];
      knots.forEach((k, i) => {
        lines.push(
          `  t_${i} = ${fmtParamCoord(k.t)},  x_${i} = ${fmtParamCoord(k.x)},  y_${i} = ${fmtParamCoord(k.y)}`
        );
      });
      return { text: lines.join('\n') };
    }

    /** 傅里叶级数：可直接粘贴到 x(t)/y(t) 输入框（math.js 语法） */
    function buildContourFourierExport(curve, harmonics) {
      const K = Math.max(8, Math.min(96, harmonics | 0));
      const M = Math.max(K * 6, 360);
      const xs = new Float64Array(M);
      const ys = new Float64Array(M);
      for (let i = 0; i < M; i++) {
        const p = sampleImageContour(curve, i / M);
        xs[i] = p.x;
        ys[i] = p.y;
      }
      const buildSeries = (arr) => {
        const terms = [];
        let mean = 0;
        for (let i = 0; i < M; i++) mean += arr[i];
        mean /= M;
        const m0 = fmtContourNum(mean);
        if (m0) terms.push(m0);
        for (let k = 1; k <= K; k++) {
          let ak = 0, bk = 0;
          for (let i = 0; i < M; i++) {
            const ang = (2 * Math.PI * k * i) / M;
            ak += arr[i] * Math.cos(ang);
            bk += arr[i] * Math.sin(ang);
          }
          ak = (2 * ak) / M;
          bk = (2 * bk) / M;
          const fa = fmtContourNum(ak);
          const fb = fmtContourNum(bk);
          if (fa) terms.push(`${fa}*cos(${k}*2*pi*t)`);
          if (fb) terms.push(`${fb}*sin(${k}*2*pi*t)`);
        }
        return terms.length ? terms.join('+').replace(/\+-/g, '-') : '0';
      };
      const xExpr = buildSeries(xs);
      const yExpr = buildSeries(ys);
      return {
        text: `x(t)=${xExpr}\ny(t)=${yExpr}`,
        xExpr,
        yExpr
      };
    }

    function buildContourExport(curve, mode) {
      if (mode === 'standard') return buildContourStandardExport(curve);
      if (mode === 'fourier') return buildContourFourierExport(curve, CONTOUR_FOURIER_HARMONICS);
      return buildContourParametricExport(curve);
    }

    const CONTOUR_EXPORT_LABELS = {
      parametric: '参数方程（t,x,y 点表）',
      standard: '标准方程',
      fourier: '傅里叶级数（math.js）'
    };

    function previewContourExport(mode) {
      const ta = document.getElementById('contourEqOut');
      if (!imageContourCurve || imageContourCurve.points.length < 3) {
        if (ta) { ta.style.display = 'none'; ta.value = ''; }
        return '';
      }
      const fmt = mode || document.getElementById('contourExportFmt')?.value || 'parametric';
      const { text } = buildContourExport(imageContourCurve, fmt);
      if (ta) {
        ta.value = text;
        ta.style.display = 'block';
      }
      return text;
    }

    async function copyContourExport(mode, opts = {}) {
      const { silent = false } = opts;
      const fmt = mode || document.getElementById('contourExportFmt')?.value || 'parametric';
      const text = previewContourExport(fmt);
      if (!text) return false;
      try {
        await navigator.clipboard.writeText(text);
        if (!silent) {
          setContourStatus(`已复制「${CONTOUR_EXPORT_LABELS[fmt] || fmt}」`, true);
        }
        return true;
      } catch (_) {
        if (!silent) setContourStatus('复制失败，请手动全选下方文本', false);
        return false;
      }
    }

    function fitImageContourViewIfNeeded() {
      if (document.getElementById('inputType2d').value !== 'imageContour') return;
      if (!imageContourCurve || imageContourCurve.points.length < 3) return;
      fitView2dToImageContour(get2dRange());
    }

    function buildArcLengthCurve(points, closed) {
      const n = points.length;
      if (n < 2) return null;
      const seg = [0];
      let total = 0;
      for (let i = 1; i < n; i++) {
        total += Math.hypot(points[i].x - points[i - 1].x, points[i].y - points[i - 1].y);
        seg.push(total);
      }
      if (closed && n > 2) {
        total += Math.hypot(points[0].x - points[n - 1].x, points[0].y - points[n - 1].y);
        seg.push(total);
      }
      if (total < 1e-9) return null;
      return { points, seg, total, closed: !!(closed && n > 2), tMin: 0, tMax: 1 };
    }

    function sampleImageContour(curve, t) {
      const { points, seg, total, closed } = curve;
      const u = Math.max(0, Math.min(1, t)) * total;
      const n = points.length;
      if (u <= 0) return { x: points[0].x, y: points[0].y };
      if (u >= total) {
        return closed
          ? { x: points[0].x, y: points[0].y }
          : { x: points[n - 1].x, y: points[n - 1].y };
      }
      let i = 0;
      while (i < seg.length - 2 && seg[i + 1] < u) i++;
      const j = (closed && i >= n - 1) ? 0 : i + 1;
      const len = seg[i + 1] - seg[i];
      const frac = len > 1e-12 ? (u - seg[i]) / len : 0;
      return {
        x: points[i].x + (points[j].x - points[i].x) * frac,
        y: points[i].y + (points[j].y - points[i].y) * frac
      };
    }

    function drawPreviewCanvas(canvas, imageData, w, h) {
      if (!canvas) return;
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#1a1a22';
      ctx.fillRect(0, 0, w, h);
      const tile = 6;
      for (let y = 0; y < h; y += tile) {
        for (let x = 0; x < w; x += tile) {
          ctx.fillStyle = (((x / tile) | 0) + ((y / tile) | 0)) % 2 ? '#252530' : '#1a1a22';
          ctx.fillRect(x, y, tile, tile);
        }
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function drawMaskPreview(canvas, mask, w, h) {
      if (!canvas) return;
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      const img = ctx.createImageData(w, h);
      for (let i = 0; i < mask.length; i++) {
        const j = i * 4;
        if (mask[i]) {
          img.data[j] = 0;
          img.data[j + 1] = 240;
          img.data[j + 2] = 255;
        } else {
          img.data[j] = 40;
          img.data[j + 1] = 40;
          img.data[j + 2] = 50;
        }
        img.data[j + 3] = 255;
      }
      ctx.putImageData(img, 0, 0);
    }

    function setContourStatus(msg, ok) {
      const el = document.getElementById('contourStatus');
      if (!el) return;
      el.textContent = msg;
      el.classList.toggle('ok', !!ok);
    }

    function catmullRomCentripetal(p0, p1, p2, p3, u) {
      const dist = (a, b) => Math.hypot(b.x - a.x, b.y - a.y);
      const lerpPt = (a, b, ta, tb, t) => {
        const w = Math.abs(tb - ta) < 1e-12 ? 0 : (t - ta) / (tb - ta);
        return { x: a.x + (b.x - a.x) * w, y: a.y + (b.y - a.y) * w };
      };
      const t0 = 0;
      const t1 = t0 + Math.pow(Math.max(dist(p0, p1), 1e-9), 0.5);
      const t2 = t1 + Math.pow(Math.max(dist(p1, p2), 1e-9), 0.5);
      const t3 = t2 + Math.pow(Math.max(dist(p2, p3), 1e-9), 0.5);
      const t = t1 + Math.max(0, Math.min(1, u)) * (t2 - t1);
      const A1 = lerpPt(p0, p1, t0, t1, t);
      const A2 = lerpPt(p1, p2, t1, t2, t);
      const A3 = lerpPt(p2, p3, t2, t3, t);
      const B1 = lerpPt(A1, A2, t0, t2, t);
      const B2 = lerpPt(A2, A3, t1, t3, t);
      return lerpPt(B1, B2, t1, t2, t);
    }

    /** 闭合曲线：向心 Catmull-Rom，u∈[0,1] 沿整圈 */
    function sampleClosedCentripetalCR(points, u) {
      const n = points.length;
      if (n < 2) return { x: points[0]?.x ?? 0, y: points[0]?.y ?? 0 };
      const fu = ((u % 1) + 1) % 1 * n;
      const i1 = Math.min(n - 1, Math.floor(fu));
      const local = fu - i1;
      const i0 = (i1 - 1 + n) % n;
      const i2 = (i1 + 1) % n;
      const i3 = (i1 + 2) % n;
      return catmullRomCentripetal(points[i0], points[i1], points[i2], points[i3], local);
    }

    function extractContourFromImage(img) {
      const scale = Math.min(1, IMAGE_CONTOUR_MAX_EDGE / Math.max(img.width, img.height));
      const w = Math.max(8, Math.round(img.width * scale));
      const h = Math.max(8, Math.round(img.height * scale));
      const hasRealAlpha = detectImageAlphaChannel(img);
      const bgMode = document.getElementById('contourBgMode').value;
      const prevCurve = imageContourCurve;
      const analysis = bgMode === 'auto' ? analyzeImageForContour(img, hasRealAlpha) : null;
      const off = document.createElement('canvas');
      off.width = w;
      off.height = h;
      const ctx = off.getContext('2d', { willReadFrequently: true });
      const pad = Math.max(2, Math.round(Math.min(w, h) * 0.012));
      if (hasRealAlpha && (bgMode === 'alpha' || (bgMode === 'auto' && analysis?.bgKind === 'transparent'))) {
        ctx.clearRect(0, 0, w, h);
      } else if (bgMode === 'auto' && analysis) {
        const br = Math.round(analysis.border.r);
        const bg = Math.round(analysis.border.g);
        const bb = Math.round(analysis.border.b);
        ctx.fillStyle = `rgb(${br},${bg},${bb})`;
        ctx.fillRect(0, 0, w, h);
      } else {
        const fillGray = bgMode === 'dark' ? 0 : 255;
        ctx.fillStyle = `rgb(${fillGray},${fillGray},${fillGray})`;
        ctx.fillRect(0, 0, w, h);
      }
      ctx.drawImage(img, pad, pad, w - pad * 2, h - pad * 2);
      const imageData = ctx.getImageData(0, 0, w, h);
      drawPreviewCanvas(document.getElementById('contourPreviewSrc'), imageData, w, h);

      const rawData = imageData.data;
      const fullAnalysis = bgMode === 'auto'
        ? analyzeImageBackground(rawData, w, h, hasRealAlpha)
        : analysis;
      const threshSlider = parseInt(document.getElementById('contourThreshold').value, 10) || 0;
      const simplifyLevel = parseInt(document.getElementById('contourSimplify').value, 10) || 0;

      const extracted = extractMaskAndContour(rawData, w, h, bgMode, threshSlider, hasRealAlpha, fullAnalysis);
      if (!extracted || extracted.pixelPts.length < 8) {
        if (prevCurve?.points?.length >= 3) {
          imageContourCurve = prevCurve;
          drawMaskPreview(document.getElementById('contourPreviewMask'), new Uint8Array(w * h), w, h);
          setContourStatus(`当前底色无法提取轮廓，已保留上次结果 · ${contourFailureHint(bgMode)}`, false);
          return false;
        }
        imageContourCurve = null;
        drawMaskPreview(document.getElementById('contourPreviewMask'), new Uint8Array(w * h), w, h);
        setContourStatus(`未检测到闭合轮廓：${contourFailureHint(bgMode)}`, false);
        return false;
      }

      const { mask, pixelPts: pixelPtsRaw, polarity, threshold, analysis: usedAnalysis, method } = extracted;
      drawMaskPreview(document.getElementById('contourPreviewMask'), mask, w, h);

      let pixelPts = pixelPtsRaw;
      if (pixelPts.length > 8000) {
        const step = Math.ceil(pixelPts.length / 8000);
        pixelPts = pixelPts.filter((_, i) => i % step === 0);
      }
      const span = Math.max(w, h);
      const epsilon = Math.min(
        span * 0.006,
        Math.max(0.12, span * 0.00022 * Math.pow(1.32, simplifyLevel))
      );
      pixelPts = douglasPeucker(pixelPts, epsilon);
      let mathPts = pixelsToMathContour(pixelPts, w, h);
      const chaikinIters = simplifyLevel <= 1 ? 3 : simplifyLevel <= 4 ? 2 : simplifyLevel <= 8 ? 1 : 0;
      if (chaikinIters > 0) mathPts = chaikinClosed(mathPts, chaikinIters);
      const targetPts = Math.max(240, Math.min(2000, Math.round(1600 - simplifyLevel * 70)));
      mathPts = resampleClosedUniform(mathPts, targetPts);
      const closed = true;
      imageContourCurve = buildArcLengthCurve(mathPts, closed);
      if (!imageContourCurve) {
        setContourStatus('轮廓点过少，无法生成曲线', false);
        return false;
      }
      let polLabel;
      if (method === 'bridge') polLabel = '浅底同色补全';
      else if (method === 'edge') polLabel = '边缘闭合';
      else if (method === 'hybrid') polLabel = '混合补全';
      else if (bgMode === 'auto') {
        polLabel = formatAutoBgLabel(usedAnalysis);
      } else if (bgMode === 'invert') {
        polLabel = '反相识别';
      } else if (polarity === 'alpha') {
        polLabel = '透明底 α';
      } else if (polarity === 'colorDist') {
        polLabel = '彩色底';
      } else {
        polLabel = polarity === 'darkOnLight' ? '浅底深线' : '深底浅线';
      }
      setContourStatus(
        `已提取 ${mathPts.length} 点 · ${polLabel} · 阈值 ${threshold}${(!threshSlider || threshSlider >= 245) ? (polarity === 'alpha' ? ' (α-Otsu)' : ' (Otsu)') : ''} · 简化 ${simplifyLevel} · t∈[0,1]`,
        true
      );
      imageContourLastLabel = polLabel + ` · 阈值 ${threshold}` + ((!threshSlider || threshSlider >= 245) ? ' (Otsu)' : '') + ` · 简化 ${simplifyLevel}`;
      document.getElementById('tMin2d').value = '0';
      document.getElementById('tMax2d').value = '1';
      previewContourExport('parametric');
      return true;
    }

    function runImageContourExtract() {
      if (!imageContourSource) {
        setContourStatus('请先上传图像', false);
        return false;
      }
      try {
        return extractContourFromImage(imageContourSource);
      } catch (e) {
        imageContourCurve = null;
        setContourStatus('提取失败: ' + (e.message || String(e)), false);
        return false;
      }
    }

    function computeRangeImageContour(curve, constraints) {
      const pts = curve.points;
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
      for (const p of pts) {
        xMin = Math.min(xMin, p.x); xMax = Math.max(xMax, p.x);
        yMin = Math.min(yMin, p.y); yMax = Math.max(yMax, p.y);
      }
      const box = padRange({ xMin, xMax, yMin, yMax }, 0.14);
      return mergeRange(box, constraints);
    }

    function sampleImageContourCatmull(curve, t) {
      const pts = curve.points;
      const n = pts.length;
      if (n < 2) return { x: pts[0]?.x ?? 0, y: pts[0]?.y ?? 0 };
      const u = Math.max(0, Math.min(1, t)) * n;
      const i = Math.min(n - 1, Math.floor(u));
      const f = u - i;
      const i0 = (i - 1 + n) % n;
      const i1 = i;
      const i2 = (i + 1) % n;
      const i3 = (i + 2) % n;
      const p0 = pts[i0], p1 = pts[i1], p2 = pts[i2], p3 = pts[i3];
      const t2 = f * f, t3 = t2 * f;
      const c = (q0, q1, q2, q3) =>
        0.5 * ((2 * q1) + (-q0 + q2) * f + (2 * q0 - 5 * q1 + 4 * q2 - q3) * t2 + (-q0 + 3 * q1 - 3 * q2 + q3) * t3);
      return { x: c(p0.x, p1.x, p2.x, p3.x), y: c(p0.y, p1.y, p2.y, p3.y) };
    }

    function drawImageContour2d(curve, range) {
      const samples = Math.min(16000, Math.max(2400, curve.points.length * 10));
      const tMin = curve.tMin, tMax = curve.tMax;
      const dt = (tMax - tMin) / samples;

      strokeCurve2d();
      ctx2d.beginPath();
      let started = false;
      for (let i = 0; i <= samples; i++) {
        const t = tMin + i * dt;
        const { x, y } = sampleImageContour(curve, t);
        if (!isFinite(x) || !isFinite(y)) continue;
        const p = worldToScreen(x, y, range);
        if (!started) { ctx2d.moveTo(p.x, p.y); started = true; }
        else ctx2d.lineTo(p.x, p.y);
      }
      finishCurve2d();
    }

    function onImageContourParamsChange() {
      if (!imageContourSource) return;
      const ok = runImageContourExtract();
      if (ok && imageContourCurve) {
        fitView2dToImageContour(get2dRange());
      }
      draw2d(false);
      if (!ok && imageContourCurve) hideError();
    }

    function bindImageContourUI() {
      const fileInput = document.getElementById('contourImageFile');
      const thresh = document.getElementById('contourThreshold');
      const threshVal = document.getElementById('contourThresholdVal');
      const simp = document.getElementById('contourSimplify');
      const simpVal = document.getElementById('contourSimplifyVal');
      const bgMode = document.getElementById('contourBgMode');

      const refreshThreshLabel = () => {
        const v = parseInt(thresh.value, 10);
        threshVal.textContent = v > 0 ? String(v) : '自动';
      };
      const refreshSimpLabel = () => { simpVal.textContent = simp.value; };

      thresh.addEventListener('input', () => {
        refreshThreshLabel();
        onImageContourParamsChange();
      });
      simp.addEventListener('input', () => {
        refreshSimpLabel();
        onImageContourParamsChange();
      });
      bgMode.addEventListener('change', () => {
        onImageContourParamsChange();
      });

      fileInput.addEventListener('change', () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          imageContourSource = img;
          imageContourFileName = file.name || '';
          imageContourPersistUrl = encodeImageContourForSession(img);
          if (!imageContourPersistUrl) {
            setContourStatus('图像过大，未写入本地缓存（轮廓仍可绘制；刷新后需重新上传）', false);
          }
          const ok = runImageContourExtract();
          draw2d(true);
          if (ok && imageContourCurve) {
            fitView2dToImageContour(get2dRange());
            draw2d(false);
          }
          scheduleSaveSession();
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          setContourStatus('图像加载失败', false);
        };
        img.src = url;
      });

      refreshThreshLabel();
      refreshSimpLabel();

      document.getElementById('contourExportFmt').addEventListener('change', () => {
        previewContourExport();
      });
      document.getElementById('contourCopyBtn').addEventListener('click', () => {
        copyContourExport();
      });
    }

    // 3D 场景
    let scene3d, camera3d, renderer3d, controls3d, plotGroup3d;
    let animFrameId = null;
    let last3dYExtent = { yMin: -6, yMax: 6 };
    let last3dPanBounds = null;
    let last3dFitDist = 12;

    function clamp3dCameraDistance() {
      if (!controls3d || !camera3d) return;
      const offset = new THREE.Vector3().subVectors(camera3d.position, controls3d.target);
      const dist = offset.length();
      if (dist < 1e-6) return;
      const minD = controls3d.minDistance;
      const maxD = controls3d.maxDistance;
      const clamped = Math.min(maxD, Math.max(minD, dist));
      if (Math.abs(clamped - dist) > 1e-5) {
        offset.normalize().multiplyScalar(clamped);
        camera3d.position.copy(controls3d.target).add(offset);
      }
    }

    function update3dPanBounds(range, yExtent) {
      const cx = (range.xMin + range.xMax) / 2;
      const cz = (range.yMin + range.yMax) / 2;
      const cy = (yExtent.yMin + yExtent.yMax) / 2;
      const spanX = Math.max(range.xMax - range.xMin, 1);
      const spanZ = Math.max(range.yMax - range.yMin, 1);
      const spanY = Math.max(yExtent.yMax - yExtent.yMin, 0.5);
      const ref = Math.max(spanX, spanZ, spanY, 2);
      const pad = ref * 0.38;
      last3dPanBounds = {
        xMin: cx - spanX * 0.5 - pad,
        xMax: cx + spanX * 0.5 + pad,
        yMin: cy - spanY * 0.5 - pad,
        yMax: cy + spanY * 0.5 + pad,
        zMin: cz - spanZ * 0.5 - pad,
        zMax: cz + spanZ * 0.5 + pad
      };
    }

    function clamp3dPanTarget() {
      if (!controls3d || !camera3d || !last3dPanBounds) return;
      const b = last3dPanBounds;
      const t = controls3d.target;
      const ox = t.x, oy = t.y, oz = t.z;
      t.x = Math.min(b.xMax, Math.max(b.xMin, t.x));
      t.y = Math.min(b.yMax, Math.max(b.yMin, t.y));
      t.z = Math.min(b.zMax, Math.max(b.zMin, t.z));
      const dx = t.x - ox, dy = t.y - oy, dz = t.z - oz;
      if (dx || dy || dz) {
        camera3d.position.x += dx;
        camera3d.position.y += dy;
        camera3d.position.z += dz;
      }
    }

    // ========== 工具函数 ==========
    const MATH_SCOPE = { PI: Math.PI, E: Math.E };

    function normalizeExpr(exprStr) {
      let s = String(exprStr).trim();
      const simpleReplacements = [
        [/×/g, '*'], [/÷/g, '/'], [/−/g, '-'], [/–/g, '-'],
        [/π/g, 'PI'], [/∞/g, 'Infinity'],
        [/²/g, '^2'], [/³/g, '^3'],
        [/\\frac\{([^}]+)\}\{([^}]+)\}/g, '($1)/($2)'],
      ];
      simpleReplacements.forEach(([pat, rep]) => { s = s.replace(pat, rep); });

      s = s.replace(/\bexp\b/gi, '§FUNCEXP§');

      // xe^x、2e^x 等连写（须在 e→E 之前）
      s = s.replace(/(\d+(?:\.\d+)?|[a-zA-Z_]\w*)e(\^|\()/gi, (_, pre, op) => `${pre}*E${op}`);

      // 自然常数 e（欧拉数），避免与 exp 等混淆（仅小写 e，勿用 i 以免误伤 §FUNCEXP§）
      s = s.replace(/(?<![a-zA-Z_])e(?![a-zA-Z_])/g, 'E');
      // ex、2ex 等：e 与变量/括号连写 → E*x
      s = s.replace(/(?<![a-zA-Z_])e(?=[a-zA-Z_(])/g, 'E*');

      // Unicode 根号
      let result = '';
      let i = 0;
      while (i < s.length) {
        const ch = s[i];
        if (ch === '√' || ch === '∛') {
          const fn = ch === '∛' ? 'cbrt' : 'sqrt';
          i++;
          while (i < s.length && /\s/.test(s[i])) i++;
          const inner = readRadicand(s, i);
          i = inner.next;
          result += fn + '(' + inner.text + ')';
        } else if (/\d/.test(ch) && s[i + 1] === '√') {
          // n√x → nthRoot(x,n)
          let n = ch;
          i += 2;
          while (i < s.length && /\s/.test(s[i])) i++;
          const inner = readRadicand(s, i);
          i = inner.next;
          result += 'nthRoot(' + inner.text + ',' + n + ')';
        } else {
          result += ch;
          i++;
        }
      }
      return insertImplicitMultiply(expandFunctionShorthand(result.replace(/§FUNCEXP§/g, 'exp')));
    }

    /** log/lg→log10(常用对数)；ln/loge→log(自然对数)；sinx、xsinx、4lnx、ln√x 等简写 */
    function expandFunctionShorthand(s) {
      const FN_LIST = ['sinh', 'cosh', 'tanh', 'asin', 'acos', 'atan', 'sin', 'cos', 'tan', 'sqrt', 'exp', 'abs', 'log10', 'log2', 'loge', 'log', 'ln', 'lg'];
      const FN = FN_LIST.join('|');
      const isFnName = (name) => FN_LIST.includes(String(name).toLowerCase());
      const normFn = (fn) => {
        const f = fn.toLowerCase();
        if (f === 'ln' || f === 'loge') return '§NATLOG§';
        if (f === 'lg') return 'log10';
        return f;
      };
      const INNER_FN = 'sqrt|cbrt|sin|cos|tan|abs|exp|asin|acos|atan';
      // loge/ln√x 等须先于 log→log10，避免 loge(x) 被拆成 log10(e(x))
      s = s.replace(new RegExp(`\\bloge\\s*(${INNER_FN})\\s*\\(`, 'gi'), '§NATLOG§($1(');
      s = s.replace(new RegExp(`\\bln\\s*(${INNER_FN})\\s*\\(`, 'gi'), '§NATLOG§($1(');
      s = s.replace(new RegExp(`\\blg\\s*(${INNER_FN})\\s*\\(`, 'gi'), 'log10($1(');
      // 数字+函数+变量：4lnx → 4*log(x)
      s = s.replace(new RegExp(`(\\d+\\.\\d*|\\d+)(${FN})([a-zA-Z_]\\w*)`, 'gi'), (_, pre, fn, arg) =>
        `${pre}*${normFn(fn)}(${arg.toLowerCase()})`);
      // 变量+函数+变量：xsinx → x*sin(x)；跳过 asin 等已完整函数名
      s = s.replace(new RegExp(`([a-zA-Z_]\\w*)(${FN})([a-zA-Z_]\\w*)`, 'gi'), (match, pre, fn, arg) => {
        if (isFnName(pre.toLowerCase())) return match;
        if (isFnName((pre + fn).toLowerCase())) return match;
        return `${pre}*${normFn(fn)}(${arg.toLowerCase()})`;
      });

      s = s.replace(/\blg\s*\(/gi, 'log10(');
      s = s.replace(/\blg\s+([a-zA-Z_]\w*)/gi, 'log10($1)');
      s = s.replace(/\blg([a-zA-Z_]\w*)/gi, 'log10($1)');
      s = s.replace(/\bloge\s*\(/gi, '§NATLOG§(');
      s = s.replace(/\bloge\s+([a-zA-Z_]\w*)/gi, '§NATLOG§($1)');
      s = s.replace(/\bloge([a-zA-Z_]\w*)/gi, (match, arg) => {
        if (isFnName(arg.toLowerCase())) return match;
        return `§NATLOG§(${arg.toLowerCase()})`;
      });
      s = s.replace(/\bln\s*\(/gi, '§NATLOG§(');
      s = s.replace(/\bln\s+([a-zA-Z_]\w*)/gi, '§NATLOG§($1)');
      s = s.replace(/\bln([a-zA-Z_]\w*)/gi, (match, arg) => {
        if (isFnName(arg.toLowerCase())) return match;
        return `§NATLOG§(${arg.toLowerCase()})`;
      });
      s = s.replace(/\blog(?!\d)(?![eE]\w)\s*\(/gi, 'log10(');
      s = s.replace(/\blog(?!\d)(?![eE]\w)\s+([a-zA-Z_]\w*)/gi, 'log10($1)');
      s = s.replace(/\blog(?!\d)(?![eE]\w)([a-zA-Z_]\w*)/gi, 'log10($1)');
      s = s.replace(/§NATLOG§/g, 'log');
      const FN_BARE = 'sinh|cosh|tanh|asin|acos|atan|sin|cos|tan|sqrt|exp|abs|log10|log2';
      const withSpace = new RegExp(`\\b(${FN_BARE})\\s+([a-zA-Z_][\\w]*)`, 'gi');
      const noSpace = new RegExp(`\\b(${FN_BARE})([a-zA-Z_][\\w]*)`, 'gi');
      const repl = (_, fn, arg) => `${fn.toLowerCase()}(${arg})`;
      s = s.replace(withSpace, repl);
      s = s.replace(noSpace, repl);
      return s;
    }

    /** 插入隐式乘号：πe→PI*E, 2x→2*x（先保护 log10/log2 等，避免变成 log10*(x)） */
    function insertImplicitMultiply(s) {
      s = s.replace(/\blog10\b/gi, '@LOG10@');
      s = s.replace(/\blog2\b/gi, '@LOG2@');
      s = s.replace(/\bnthRoot\b/gi, '@NTHROOT@');
      s = s.replace(/PI\s*(?=E\b)/gi, 'PI*');
      s = s.replace(/([a-zA-Z_]\w*)(?=PI(?:\^|\(|\b|$))/gi, '$1*');
      s = s.replace(/([a-zA-Z_]\w*)(?=E(?:\^|\(|\b|$))/gi, '$1*');
      s = s.replace(/(\d+\.\d+|\d+)(?=[a-zA-Z_(])/g, '$1*');
      s = s.replace(/(PI|E)\s*(?=[a-zA-Z_(])/g, '$1*');
      s = s.replace(/\)\s*(?=[a-zA-Z_(])/g, ')*');
      s = s.replace(/@LOG10@/g, 'log10');
      s = s.replace(/@LOG2@/g, 'log2');
      s = s.replace(/@NTHROOT@/g, 'nthRoot');
      return s;
    }

    /** 读取根号后的被开方数 */
    function readRadicand(s, start) {
      let i = start;
      while (i < s.length && /\s/.test(s[i])) i++;
      if (i >= s.length) return { text: '0', next: i };

      if (s[i] === '(') {
        let depth = 0;
        const open = i;
        while (i < s.length) {
          if (s[i] === '(') depth++;
          else if (s[i] === ')') {
            depth--;
            if (depth === 0) {
              return { text: s.slice(open + 1, i), next: i + 1 };
            }
          }
          i++;
        }
        return { text: s.slice(open + 1), next: s.length };
      }

      const ident = s.slice(i).match(/^([a-zA-Z_]\w*|\d+(?:\.\d+)?)/);
      if (!ident) return { text: '0', next: i };

      let text = ident[1];
      i += ident[0].length;

      // √sin(x) → sqrt(sin(x))
      if (s[i] === '(') {
        let depth = 0;
        const open = i;
        while (i < s.length) {
          if (s[i] === '(') depth++;
          else if (s[i] === ')') {
            depth--;
            if (depth === 0) {
              text += s.slice(open, i + 1);
              i++;
              break;
            }
          }
          i++;
        }
      }
      return { text, next: i };
    }

    function sanitizeValue(v) {
      if (v === null || v === undefined) return NaN;
      try {
        if (typeof math !== 'undefined' && math.isComplex?.(v)) {
          if (Math.abs(v.im) > 1e-9) return NaN;
          v = v.re;
        }
        const n = typeof math !== 'undefined' ? math.number(v) : Number(v);
        if (!isFinite(n)) return NaN;
        return n;
      } catch (_) {
        return NaN;
      }
    }

    function validateExprVars(node, varSet) {
      const known = new Set(['PI', 'E', 'i', 'Infinity', 'NaN', 'true', 'false', 'e', 'pi']);
      node.traverse((n) => {
        if (!n.isSymbolNode) return;
        const name = n.name;
        if (varSet.has(name) || known.has(name) || name in MATH_SCOPE) return;
        if (typeof math[name] === 'function' || typeof math[name] === 'number') return;
        throw new Error(`无法识别「${name}」。请检查拼写；相邻项请用 * 连接，如 x*e^x、x*PI^x、x*sin(x)`);
      });
    }

    /** 将表达式中的变量名统一为小写（X→x，兼容大小写输入） */
    function normalizeVarCase(expr, vars) {
      if (!vars?.length) return expr;
      const allowed = new Set(vars.map(v => v.toLowerCase()));
      const reserved = new Set(['PI', 'E', 'Infinity', 'NaN', 'i', 'true', 'false']);
      return expr.replace(/[a-zA-Z_][a-zA-Z0-9_]*/g, (ident) => {
        if (reserved.has(ident)) return ident;
        const low = ident.toLowerCase();
        if (allowed.has(low)) return low;
        return ident;
      });
    }

    function compileExpr(exprStr, vars) {
      let normalized = normalizeExpr(exprStr);
      normalized = normalizeVarCase(normalized, vars);
      if (!normalized) throw new Error('请输入表达式');
      let node;
      try {
        node = math.parse(normalized);
      } catch (e) {
        throw new Error('语法有误：' + (e.message || String(e)).replace(/^Syntax error:?/i, ''));
      }
      validateExprVars(node, new Set(vars.map(v => v.toLowerCase())));
      const code = node.compile();
      return (scope) => {
        const s = Object.assign({}, MATH_SCOPE, scope);
        return sanitizeValue(code.evaluate(s));
      };
    }

    function showError(msg) {
      errorOverlay.textContent = msg;
      errorOverlay.classList.add('visible');
    }

    function hideError() {
      errorOverlay.classList.remove('visible');
    }

    let plotRange2d = null;

    function parseRangeField(id) {
      const raw = document.getElementById(id).value.trim();
      if (raw === '' || raw === '自动' || raw.toLowerCase() === 'auto') return null;
      const n = parseFloat(raw);
      return Number.isFinite(n) ? n : null;
    }

    /** 参数方程 t 范围：空值回退默认并写回输入框，非法则抛错 */
    function parseParamTRange(minId, maxId, defaults = { min: 0, max: 6.283 }) {
      const minEl = document.getElementById(minId);
      const maxEl = document.getElementById(maxId);
      const rawMin = minEl.value.trim();
      const rawMax = maxEl.value.trim();
      let tMin = rawMin === '' ? defaults.min : parseFloat(rawMin);
      let tMax = rawMax === '' ? defaults.max : parseFloat(rawMax);
      if (rawMin === '') minEl.value = String(defaults.min);
      if (rawMax === '') maxEl.value = String(defaults.max);
      if (!Number.isFinite(tMin) || !Number.isFinite(tMax)) {
        throw new Error('请填写有效的 t 范围（例如 t 最小=0，t 最大=6.283）');
      }
      if (tMin >= tMax) throw new Error('t 最小须小于 t 最大');
      return { tMin, tMax };
    }

    /** 切到参数模式时，补全/修正 t 范围（避免空值或轮廓模式遗留的 0~1） */
    function ensureParamTRangeDefaults(fromContour = false) {
      const minEl = document.getElementById('tMin2d');
      const maxEl = document.getElementById('tMax2d');
      const rawMin = minEl.value.trim();
      const rawMax = maxEl.value.trim();
      const tMin = rawMin === '' ? NaN : parseFloat(rawMin);
      const tMax = rawMax === '' ? NaN : parseFloat(rawMax);
      const invalid = !Number.isFinite(tMin) || !Number.isFinite(tMax) || tMin >= tMax;
      const contourNorm = Number.isFinite(tMin) && Number.isFinite(tMax) &&
        Math.abs(tMin) < 1e-9 && Math.abs(tMax - 1) < 1e-9;
      if (invalid || fromContour || contourNorm) {
        minEl.value = '0';
        maxEl.value = '12.566';
      }
    }

    function get2dRangeConstraints() {
      return {
        xMin: parseRangeField('xMin2d'),
        xMax: parseRangeField('xMax2d'),
        yMin: parseRangeField('yMin2d'),
        yMax: parseRangeField('yMax2d')
      };
    }

    function padRange(r, ratio) {
      ratio = ratio ?? 0.1;
      let xMin = r.xMin, xMax = r.xMax, yMin = r.yMin, yMax = r.yMax;
      if (xMax - xMin < 1e-6) { xMin -= 0.5; xMax += 0.5; }
      if (yMax - yMin < 1e-6) { yMin -= 0.5; yMax += 0.5; }
      const mx = (xMax - xMin) * ratio;
      const my = (yMax - yMin) * ratio;
      return { xMin: xMin - mx, xMax: xMax + mx, yMin: yMin - my, yMax: yMax + my };
    }

    /** 等比例取景：x/y 跨度取较大值，避免圆被拉扁且曲线过小 */
    function equalizePlotRange(r, marginRatio) {
      marginRatio = marginRatio ?? 0.14;
      const cx = (r.xMin + r.xMax) / 2;
      const cy = (r.yMin + r.yMax) / 2;
      const span = Math.max(r.xMax - r.xMin, r.yMax - r.yMin, 0.4);
      const half = span * (0.5 + marginRatio);
      return { xMin: cx - half, xMax: cx + half, yMin: cy - half, yMax: cy + half };
    }

    /** 扫描隐式曲线 f(x,y)=0 的包围盒（符号变化 / 近零） */
    function probeImplicitContour(fn, half, gridN) {
      const lo = -half, hi = half;
      const step = (hi - lo) / gridN;
      const vals = [];
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
      let found = false;

      for (let j = 0; j <= gridN; j++) {
        vals[j] = [];
        const y = lo + j * step;
        for (let i = 0; i <= gridN; i++) {
          const x = lo + i * step;
          try {
            const v = fn({ x, y });
            vals[j][i] = (typeof v === 'number' && isFinite(v)) ? v : NaN;
          } catch (_) {
            vals[j][i] = NaN;
          }
        }
      }

      for (let j = 0; j < gridN; j++) {
        for (let i = 0; i < gridN; i++) {
          const v = [vals[j][i], vals[j][i + 1], vals[j + 1][i + 1], vals[j + 1][i]];
          if (v.some(n => isNaN(n))) continue;
          const nearZero = v.some(n => Math.abs(n) < step * 2);
          const signMix = v.some(n => n > 0) && v.some(n => n < 0);
          if (!nearZero && !signMix) continue;
          found = true;
          const x0 = lo + i * step, x1 = x0 + step;
          const y0 = lo + j * step, y1 = y0 + step;
          xMin = Math.min(xMin, x0); xMax = Math.max(xMax, x1);
          yMin = Math.min(yMin, y0); yMax = Math.max(yMax, y1);
        }
      }
      if (!found) return null;
      return { xMin, xMax, yMin, yMax };
    }

    function mergeRange(computed, constraints) {
      const r = {
        xMin: constraints.xMin ?? computed.xMin,
        xMax: constraints.xMax ?? computed.xMax,
        yMin: constraints.yMin ?? computed.yMin,
        yMax: constraints.yMax ?? computed.yMax
      };
      if (r.xMin >= r.xMax) {
        if (constraints.xMin != null && constraints.xMax != null) {
          throw new Error('x 最小值必须小于 x 最大值');
        }
        const mid = (r.xMin + r.xMax) / 2;
        r.xMin = mid - 0.5;
        r.xMax = mid + 0.5;
      }
      if (r.yMin >= r.yMax) {
        if (constraints.yMin != null && constraints.yMax != null) {
          throw new Error('y 最小值必须小于 y 最大值');
        }
        const mid = (r.yMin + r.yMax) / 2;
        const half = Math.max(Math.abs(mid) * 0.1, 0.5);
        r.yMin = mid - half;
        r.yMax = mid + half;
      }
      return r;
    }

    /** 根据表达式推断定义域限制（仅在有约束时设置，全 R 则保持 ±Infinity） */
    function inferDomainRestrictions(expr) {
      const e = normalizeExpr(expr).toLowerCase();
      const compact = e.replace(/\s/g, '');
      const r = { xMin: -Infinity, xMax: Infinity, yMin: -Infinity, yMax: Infinity };
      if (/\blog\s*\(\s*sqrt\s*\(\s*x\s*\)/.test(e) || /\blog\s*\(\s*x\s*\)/.test(e) ||
          /\blog10\s*\(\s*[^)]*\bx\b|\blog(?!\d)\s*\(\s*[^)]*\bx\b|\blg\s*\(\s*[^)]*\bx\b|\blg\s*x\b/.test(e)) {
        r.xMin = Math.max(r.xMin, 1e-4);
      }
      // 仅 sqrt(x) 类需 x≥0；sqrt(x^2+y^2) 等复合式不限
      if (/\bsqrt\s*\(\s*x\s*\)/.test(e) || /√\s*x\b/.test(e)) {
        r.xMin = Math.max(r.xMin, 0);
      }
      if (/\basin\s*\(|\bacos\s*\(/.test(e)) { r.xMin = -1; r.xMax = 1; }
      // x^x / x^x^x... 在负 x 上实数无定义，默认只采样 x > 0
      const caretCount = (compact.match(/\^/g) || []).length;
      if (caretCount >= 1 && /x(\^x)+/.test(compact)) {
        r.xMin = Math.max(r.xMin, 1e-4);
      }
      return r;
    }

    function get3dSurfaceRange(expr) {
      const r = get3dRange();
      if (!expr) return r;
      const dom = inferDomainRestrictions(expr);
      const out = { xMin: r.xMin, xMax: r.xMax, yMin: r.yMin, yMax: r.yMax };
      if (dom.xMin > -Infinity) out.xMin = Math.max(out.xMin, dom.xMin);
      if (dom.xMax < Infinity) out.xMax = Math.min(out.xMax, dom.xMax);
      if (dom.yMin > -Infinity) out.yMin = Math.max(out.yMin, dom.yMin);
      if (dom.yMax < Infinity) out.yMax = Math.min(out.yMax, dom.yMax);
      if (out.xMin >= out.xMax) { out.xMin = r.xMin; out.xMax = r.xMax; }
      if (out.yMin >= out.yMax) { out.yMin = r.yMin; out.yMax = r.yMax; }
      return out;
    }

    function evalSurfaceZ(fn, x, y) {
      try {
        const z = fn({ x, y });
        if (!Number.isFinite(z) || Math.abs(z) > 1e14) return NaN;
        return z;
      } catch (_) {
        return NaN;
      }
    }

    /** 极端 z 时压缩视口高度，避免相机被拉远成一条线 */
    function computeRobustZExtent(validZs, xySpan) {
      const half = Math.max(xySpan * 0.45, 2);
      if (!validZs.length) return { yMin: -half, yMax: half, overflow: false };
      let zMin = Infinity, zMax = -Infinity;
      for (const z of validZs) {
        if (z < zMin) zMin = z;
        if (z > zMax) zMax = z;
      }
      const xyCap = Math.max(xySpan * 5, 16);
      let frameMin = zMin, frameMax = zMax;
      let overflow = false;
      const zSpan = zMax - zMin;
      if (zSpan > xyCap * 4 || zMax > xyCap * 6 || zMin < -xyCap * 6) {
        overflow = true;
        frameMax = Math.min(zMax, xyCap);
        frameMin = zMin >= 0 ? Math.max(0, zMin) : Math.max(zMin, -xyCap);
        if (frameMax - frameMin < xyCap * 0.35) {
          frameMax = frameMin + xyCap;
        }
      }
      const pad = Math.max((frameMax - frameMin) * 0.14, 0.5);
      return { yMin: frameMin - pad, yMax: frameMax + pad, overflow, zMaxRaw: zMax };
    }

    function isPowerTowerExpr(expr) {
      const compact = normalizeExpr(expr).replace(/\s/g, '');
      // 仅纯幂塔 x^x^x…；含 (lnx+1)^2、分式、乘积等一律不算
      return /^x(\^x)+$/i.test(compact);
    }

    function powerTowerCaretCount(expr) {
      const compact = normalizeExpr(expr).replace(/\s/g, '');
      return (compact.match(/\^/g) || []).length;
    }

    function powerTowerLevels(expr) {
      return powerTowerCaretCount(expr) + 1;
    }

    /** 幂塔右结合求值，用于探测 x 上界 */
    function evalPowerTowerRaw(x, levels) {
      let v = x;
      for (let i = 1; i < levels; i++) {
        v = Math.pow(x, v);
        if (!Number.isFinite(v)) return NaN;
      }
      return v;
    }

    /** 二分查找最后一个 y 为有限值的 x */
    function probePowerTowerXMax(levels) {
      if (levels < 2) return 8;
      let lo = 1;
      let hi = 1.05;
      while (hi < 4 && Number.isFinite(evalPowerTowerRaw(hi, levels))) {
        lo = hi;
        hi += levels >= 12 ? 0.02 : levels >= 6 ? 0.05 : 0.1;
      }
      if (Number.isFinite(evalPowerTowerRaw(hi, levels))) return 4;
      for (let i = 0; i < 50; i++) {
        const mid = (lo + hi) / 2;
        if (Number.isFinite(evalPowerTowerRaw(mid, levels))) lo = mid;
        else hi = mid;
      }
      return lo * 0.999;
    }

    let lastPowerTowerXCap = null;

    /** 将 y 映射到可绘制值：过大则裁剪到视口边缘，Infinity 返回 null */
    function normalizeExplicitPlotY(y, range, vis) {
      if (!Number.isFinite(y)) return null;
      const vb = vis || range;
      const span = Math.max(vb.yMax - vb.yMin, range.yMax - range.yMin, 1e-6);
      if (Math.abs(y) > span * 40 || Math.abs(y) > 1e308) return null;
      if (y > vb.yMax) return { y: vb.yMax, clipped: 'top', raw: y };
      if (y < vb.yMin) return { y: vb.yMin, clipped: 'bottom', raw: y };
      return { y, clipped: null, raw: y };
    }

    let lastSurfaceZStats = null;
    function isPlottableExplicitY(y, range, visBounds) {
      return normalizeExplicitPlotY(y, range, visBounds) != null;
    }

    /** 相邻采样点之间自适应细分，避免放大后陡变函数出现虚线 */
    function subdivideExplicitSegment(fn, x0, y0, x1, y1, range, vis, maxScreenJump, depth, maxDepth) {
      if (depth > maxDepth) return false;
      const p0 = worldToScreen(x0, y0, range);
      const p1 = worldToScreen(x1, y1, range);
      if (Math.abs(p1.y - p0.y) <= maxScreenJump && Math.abs(p1.x - p0.x) <= maxScreenJump * 2) {
        ctx2d.lineTo(p1.x, p1.y);
        return true;
      }
      const xm = (x0 + x1) / 2;
      let ym;
      try { ym = fn({ x: xm }); } catch (_) { return false; }
      const normM = normalizeExplicitPlotY(ym, range, vis);
      if (!normM) return false;
      ym = normM.y;
      const pm = worldToScreen(xm, ym, range);
      const midErr = Math.abs(pm.y - (p0.y + p1.y) / 2);
      const needSplit = midErr > 1.2
        || Math.abs(p1.y - p0.y) > maxScreenJump
        || Math.abs(p1.x - p0.x) > maxScreenJump * 2;
      if (!needSplit) {
        ctx2d.lineTo(p1.x, p1.y);
        return true;
      }
      if (!subdivideExplicitSegment(fn, x0, y0, xm, ym, range, vis, maxScreenJump, depth + 1, maxDepth)) {
        return false;
      }
      return subdivideExplicitSegment(fn, xm, ym, x1, y1, range, vis, maxScreenJump, depth + 1, maxDepth);
    }

    const DEFAULT_PROBE_RANGE = { xMin: -10, xMax: 10, yMin: -10, yMax: 10 };

    /** 单轴显示跨度上限（手动约束模式） */
    const VIEW_LIMITS = {
      maxSpan2d: 80,
      maxManualSpan2d: 2000,
      maxManualAbs2d: 1e6,
      maxSpan3d: 40,
      /** 自动模式：短边固定 ±20，长边按画布比例延伸以铺满 */
      fixedAuto: { xMin: -20, xMax: 20, yMin: -20, yMax: 20 },
      baseHalf2d: 20,
      default2d: { xMin: -20, xMax: 20, yMin: -20, yMax: 20 },
      minScale2d: 1,
      maxScale2d: 4,
    };

    /** 强制 x/y 等跨度（仅用于需要正方形的特殊场景） */
    function forceSquareRange(r) {
      const cx = (r.xMin + r.xMax) / 2;
      const cy = (r.yMin + r.yMax) / 2;
      const half = Math.max(r.xMax - r.xMin, r.yMax - r.yMin, 1e-9) / 2;
      return { xMin: cx - half, xMax: cx + half, yMin: cy - half, yMax: cy + half };
    }

    /** 在保留用户范围的前提下，按画布宽高比扩展，使坐标区铺满画布（1:1 单位比例） */
    function fitRangeToCanvasAspect(r) {
      const { w, h } = getCanvasSize();
      if (w <= 0 || h <= 0) return { ...r };
      const cx = (r.xMin + r.xMax) / 2;
      const cy = (r.yMin + r.yMax) / 2;
      let xHalf = Math.max((r.xMax - r.xMin) / 2, 1e-9);
      let yHalf = Math.max((r.yMax - r.yMin) / 2, 1e-9);
      const canvasAspect = w / h;
      const dataAspect = xHalf / yHalf;
      if (canvasAspect > dataAspect) {
        xHalf = yHalf * canvasAspect;
      } else {
        yHalf = xHalf / canvasAspect;
      }
      return { xMin: cx - xHalf, xMax: cx + xHalf, yMin: cy - yHalf, yMax: cy + yHalf };
    }

    function getSquarePlotRange(range) {
      return forceSquareRange(range);
    }

    /** 短边固定 baseHalf，长边按画布宽高比延伸，网格铺满整个画布 */
    function getAspectFitRange(base) {
      const { w, h } = getCanvasSize();
      const baseHalf = (base.xMax - base.xMin) / 2;
      if (!Number.isFinite(baseHalf) || baseHalf <= 0) return { ...base };
      if (w >= h) {
        const xHalf = baseHalf * (w / h);
        return { xMin: -xHalf, xMax: xHalf, yMin: -baseHalf, yMax: baseHalf };
      }
      const yHalf = baseHalf * (h / w);
      return { xMin: -baseHalf, xMax: baseHalf, yMin: -yHalf, yMax: yHalf };
    }

    /** 自动模式下限制方形视口跨度（x/y 始终等长，保证 1:1 比例尺） */
    function clampSquareDisplayRange(r, maxSpan) {
      const cx = (r.xMin + r.xMax) / 2;
      const cy = (r.yMin + r.yMax) / 2;
      let span = Math.max(r.xMax - r.xMin, r.yMax - r.yMin, 0.4);
      span = Math.min(span, maxSpan);
      const half = span / 2;
      return { xMin: cx - half, xMax: cx + half, yMin: cy - half, yMax: cy + half };
    }

    /** 视口尽量包含原点附近（类似 Desmos / GeoGebra） */
    function expandRangeNearOrigin(r) {
      let { xMin, xMax, yMin, yMax } = r;
      const xSpan = xMax - xMin, ySpan = yMax - yMin;
      if (xMin > 0 && xMin < xSpan * 0.45) xMin = 0;
      if (xMax < 0 && -xMax < xSpan * 0.45) xMax = 0;
      if (yMin > 0 && yMin < ySpan * 0.45) yMin = 0;
      if (yMax < 0 && -yMax < ySpan * 0.45) yMax = 0;
      return { xMin, xMax, yMin, yMax };
    }

    function isAllAuto2d(constraints) {
      return constraints.xMin == null && constraints.xMax == null &&
             constraints.yMin == null && constraints.yMax == null;
    }

    function isFullyManual2d(constraints) {
      return constraints.xMin != null && constraints.xMax != null &&
             constraints.yMin != null && constraints.yMax != null;
    }

    /** 手动范围：限制跨度与绝对值，避免超大坐标导致采样失效、曲线看不见 */
    function validateManual2dSpan(constraints) {
      const maxSpan = VIEW_LIMITS.maxManualSpan2d;
      const maxAbs = VIEW_LIMITS.maxManualAbs2d;
      const checkVal = (v, label) => {
        if (v == null || !Number.isFinite(v)) return;
        if (Math.abs(v) > maxAbs) {
          throw new Error(
            `${label} 数值过大（|值| 建议 ≤ ${formatNum(maxAbs)}）。` +
            ' 超大范围下采样点过稀，曲线会缩成看不见的一条线'
          );
        }
      };
      const checkSpan = (lo, hi, name) => {
        if (lo == null || hi == null || hi <= lo) return;
        const span = hi - lo;
        if (span > maxSpan) {
          throw new Error(
            `${name} 范围跨度过大（当前 ${formatNum(span)}，建议不超过 ${formatNum(maxSpan)}）。` +
            ' 请检查是否多打了数字'
          );
        }
      };
      checkVal(constraints.xMin, 'x 最小');
      checkVal(constraints.xMax, 'x 最大');
      checkVal(constraints.yMin, 'y 最小');
      checkVal(constraints.yMax, 'y 最大');
      checkSpan(constraints.xMin, constraints.xMax, 'x');
      checkSpan(constraints.yMin, constraints.yMax, 'y');
    }

    function isContourMetaExpr(s) {
      return /分段线性|图像轮廓|结点/.test(String(s || ''));
    }

    /** 从图像轮廓切到参数模式时，清除不可解析的描述文字 */
    function sanitizeParametricFieldsAfterContour() {
      const xEl = document.getElementById('xExpr2d');
      const yEl = document.getElementById('yExpr2d');
      if (xEl && isContourMetaExpr(xEl.value)) xEl.value = 'cos(t)';
      if (yEl && isContourMetaExpr(yEl.value)) yEl.value = 'sin(t)';
    }

    function clampView2dScaleOnly() {
      const s = Number(view2d.scale) || 1;
      view2d.scale = Math.max(VIEW_LIMITS.minScale2d, Math.min(VIEW_LIMITS.maxScale2d, s));
      if (view2d.scale <= VIEW_LIMITS.minScale2d + 1e-6) {
        view2d.scale = VIEW_LIMITS.minScale2d;
        view2d.offsetX = 0;
        view2d.offsetY = 0;
      }
    }

    function update2dHintText() {
      if (currentMode !== '2d') return;
      hintText.textContent = '拖拽平移 · 滚轮缩放';
    }

    function finalizePlotRange(range, constraints) {
      if (isAllAuto2d(constraints)) {
        return { ...VIEW_LIMITS.fixedAuto };
      }
      if (isFullyManual2d(constraints)) {
        return {
          xMin: constraints.xMin,
          xMax: constraints.xMax,
          yMin: constraints.yMin,
          yMax: constraints.yMax
        };
      }
      let r = clampDisplayRange({ ...range }, constraints, VIEW_LIMITS.maxSpan2d);
      const xAuto = constraints.xMin == null && constraints.xMax == null;
      const yAuto = constraints.yMin == null && constraints.yMax == null;
      if (xAuto || yAuto) {
        const span = Math.max(r.xMax - r.xMin, r.yMax - r.yMin, 0.4);
        const cx = (r.xMin + r.xMax) / 2;
        const cy = (r.yMin + r.yMax) / 2;
        const half = span / 2;
        if (xAuto) { r.xMin = cx - half; r.xMax = cx + half; }
        if (yAuto) { r.yMin = cy - half; r.yMax = cy + half; }
      }
      return fitRangeToCanvasAspect(r);
    }

    /** 手动约束时单轴跨度上限 */
    function clampDisplayRange(r, constraints, maxSpan) {
      const out = { xMin: r.xMin, xMax: r.xMax, yMin: r.yMin, yMax: r.yMax };
      const fixAxis = (minKey, maxKey, cMin, cMax) => {
        if (cMin != null || cMax != null) return;
        let lo = out[minKey], hi = out[maxKey];
        if (!Number.isFinite(lo) || !Number.isFinite(hi) || hi <= lo) {
          out[minKey] = -maxSpan / 2;
          out[maxKey] = maxSpan / 2;
          return;
        }
        const span = hi - lo;
        if (span > maxSpan) {
          const mid = (lo + hi) / 2;
          out[minKey] = mid - maxSpan / 2;
          out[maxKey] = mid + maxSpan / 2;
        }
      };
      fixAxis('xMin', 'xMax', constraints?.xMin, constraints?.xMax);
      fixAxis('yMin', 'yMax', constraints?.yMin, constraints?.yMax);
      return out;
    }
    function clampView2d(range) {
      clampView2dScaleOnly();
      const t = getPlotTransform(range);
      const { w, h } = getCanvasSize();
      const margin = Math.min(w, h) * 0.04;
      const s = view2d.scale;
      const plotScreenW = t.plotW * s;
      const plotScreenH = t.plotH * s;
      const halfW = plotScreenW / 2;
      const halfH = plotScreenH / 2;

      if (Math.abs(s - 1) < 1e-6 && plotScreenW >= w - 1 && plotScreenH >= h - 1 &&
          isAllAuto2d(get2dRangeConstraints())) {
        view2d.offsetX = 0;
        view2d.offsetY = 0;
        return;
      }

      const clampAxis = (offset, canvasSize, plotScreen, half) => {
        const center = canvasSize / 2 + offset;
        let minC, maxC;
        if (plotScreen <= canvasSize - 2 * margin) {
          minC = margin + half;
          maxC = canvasSize - margin - half;
        } else {
          minC = canvasSize - margin - half;
          maxC = margin + half;
        }
        if (minC > maxC) return 0;
        return Math.max(minC, Math.min(maxC, center)) - canvasSize / 2;
      };

      view2d.offsetX = clampAxis(view2d.offsetX, w, plotScreenW, halfW);
      view2d.offsetY = clampAxis(view2d.offsetY, h, plotScreenH, halfH);
    }

    /** 图像轮廓使用固定坐标系，尺寸由归一化控制 */
    function fitView2dToImageContour(_range) {}

    /** 隐式方程采样区域：限定在坐标框内 */
    function getImplicitSampleRange(range, constraints) {
      return {
        xMin: constraints.xMin ?? range.xMin,
        xMax: constraints.xMax ?? range.xMax,
        yMin: constraints.yMin ?? range.yMin,
        yMax: constraints.yMax ?? range.yMax
      };
    }

    /** 显式函数 x 方向采样：限定在坐标框内；幂塔自动截断至可计算 x 上界 */
    function getExplicitXSampleRange(range, constraints, expr) {
      const dom = inferDomainRestrictions(expr);
      let xMin = constraints.xMin ?? range.xMin;
      let xMax = constraints.xMax ?? range.xMax;
      if (dom.xMin > -Infinity) xMin = Math.max(xMin, dom.xMin);
      if (dom.xMax < Infinity) xMax = Math.min(xMax, dom.xMax);
      lastPowerTowerXCap = null;
      if (isPowerTowerExpr(expr)) {
        const levels = powerTowerLevels(expr);
        if (levels >= 4) {
          const cap = probePowerTowerXMax(levels);
          lastPowerTowerXCap = cap;
          const capHi = cap * 0.999;
          if (constraints.xMax == null) {
            xMax = Math.min(xMax, capHi);
          }
          // 手动 x 很宽时仍只在可计算区间内加密采样（否则有效段挤成 1 像素）
          const lo = Math.max(xMin, 1e-9);
          const hi = Math.min(xMax, capHi);
          if (hi > lo) {
            xMin = lo;
            xMax = hi;
          }
        }
      }
      if (xMin >= xMax) {
        xMin = range.xMin;
        xMax = lastPowerTowerXCap ?? range.xMax;
      }
      return { xMin, xMax };
    }

    function updateRangeHint(range, constraints) {
      const el = document.getElementById('rangeHint2d');
      if (!el) return;
      const parts = [];
      const axes = [
        ['x', constraints.xMin, constraints.xMax, range.xMin, range.xMax],
        ['y', constraints.yMin, constraints.yMax, range.yMin, range.yMax]
      ];
      axes.forEach(([name, cMin, cMax, vMin, vMax]) => {
        const cMinS = cMin != null ? '约束' : '自动';
        const cMaxS = cMax != null ? '约束' : '自动';
        parts.push(`${name}∈[${formatNum(vMin)}, ${formatNum(vMax)}]（${cMinS}/${cMaxS}）`);
      });
      let text = '当前视图: ' + parts.join(' · ');
      if (explicitPlotHint) {
        text += ' · ' + explicitPlotHint;
      }
      el.textContent = text;
    }

    function withPlotClip(range, drawFn) {
      const tl = worldToScreen(range.xMin, range.yMax, range);
      const br = worldToScreen(range.xMax, range.yMin, range);
      const x0 = Math.min(tl.x, br.x);
      const y0 = Math.min(tl.y, br.y);
      const x1 = Math.max(tl.x, br.x);
      const y1 = Math.max(tl.y, br.y);
      ctx2d.save();
      ctx2d.beginPath();
      ctx2d.rect(x0, y0, x1 - x0, y1 - y0);
      ctx2d.clip();
      drawFn();
      ctx2d.restore();
    }

    function computeRangeExplicit(fn, expr, constraints) {
      const dom = inferDomainRestrictions(expr);

      // 常数函数 y = c（不含 x，如 πe、2+3）
      const y0 = fn({ x: 0 }), y1 = fn({ x: 1 });
      if (isFinite(y0) && isFinite(y1) && Math.abs(y0 - y1) < 1e-9) {
        const c = y0;
        if (constraints.yMin != null && c < constraints.yMin) {
          throw new Error('常数 y ≈ ' + formatNum(c) + ' 低于 y 最小约束 ' + constraints.yMin);
        }
        if (constraints.yMax != null && c > constraints.yMax) {
          throw new Error('常数 y ≈ ' + formatNum(c) + ' 高于 y 最大约束 ' + constraints.yMax);
        }
        const xMin = constraints.xMin ?? -5;
        const xMax = constraints.xMax ?? 5;
        return padRange(mergeRange({ xMin, xMax, yMin: c, yMax: c }, constraints), 0.12);
      }

      let sxMin = constraints.xMin ?? DEFAULT_PROBE_RANGE.xMin;
      let sxMax = constraints.xMax ?? DEFAULT_PROBE_RANGE.xMax;
      if (constraints.xMin == null && dom.xMin > -Infinity) sxMin = Math.max(sxMin, dom.xMin);
      if (constraints.xMax == null && dom.xMax < Infinity) sxMax = Math.min(sxMax, dom.xMax);
      const samples = 2500;
      const dx = (sxMax - sxMin) / samples;
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
      let n = 0;
      for (let i = 0; i <= samples; i++) {
        const x = sxMin + i * dx;
        const y = fn({ x });
        if (!isFinite(y)) continue;
        if (constraints.yMin != null && y < constraints.yMin) continue;
        if (constraints.yMax != null && y > constraints.yMax) continue;
        xMin = Math.min(xMin, x); xMax = Math.max(xMax, x);
        yMin = Math.min(yMin, y); yMax = Math.max(yMax, y);
        n++;
      }
      if (n === 0) {
        if (constraints.xMin != null && constraints.xMax != null &&
            constraints.yMin != null && constraints.yMax != null) {
          return mergeRange({ xMin: constraints.xMin, xMax: constraints.xMax, yMin: constraints.yMin, yMax: constraints.yMax }, constraints);
        }
        throw new Error('函数在有效定义域内无实数值，请调整表达式或约束范围');
      }
      const needPad = constraints.xMin == null || constraints.xMax == null ||
                      constraints.yMin == null || constraints.yMax == null;
      const box = needPad ? padRange({ xMin, xMax, yMin, yMax }) : { xMin, xMax, yMin, yMax };
      return mergeRange(box, constraints);
    }

    function computeRangeParametric(fnX, fnY, tMin, tMax, constraints) {
      const samples = 2500;
      const dt = (tMax - tMin) / samples;
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
      let n = 0;
      for (let i = 0; i <= samples; i++) {
        const t = tMin + i * dt;
        const x = fnX({ t }), y = fnY({ t });
        if (!isFinite(x) || !isFinite(y)) continue;
        xMin = Math.min(xMin, x); xMax = Math.max(xMax, x);
        yMin = Math.min(yMin, y); yMax = Math.max(yMax, y);
        n++;
      }
      if (n === 0) throw new Error('参数曲线无有效实数点');
      const needPad = constraints.xMin == null || constraints.xMax == null ||
                      constraints.yMin == null || constraints.yMax == null;
      const box = needPad ? padRange({ xMin, xMax, yMin, yMax }) : { xMin, xMax, yMin, yMax };
      return mergeRange(box, constraints);
    }

    function computeRangeImplicit(expr, constraints) {
      const allAuto = constraints.xMin == null && constraints.xMax == null &&
                      constraints.yMin == null && constraints.yMax == null;
      if (!allAuto) {
        const dom = inferDomainRestrictions(expr);
        const base = {
          xMin: constraints.xMin ?? (dom.xMin > -Infinity ? dom.xMin : DEFAULT_PROBE_RANGE.xMin),
          xMax: constraints.xMax ?? (dom.xMax < Infinity ? dom.xMax : DEFAULT_PROBE_RANGE.xMax),
          yMin: constraints.yMin ?? DEFAULT_PROBE_RANGE.yMin,
          yMax: constraints.yMax ?? DEFAULT_PROBE_RANGE.yMax
        };
        return mergeRange(base, constraints);
      }

      const fn = compileExpr(expr, ['x', 'y']);
      for (const half of [6, 15, 30, 50]) {
        const box = probeImplicitContour(fn, half, 96);
        if (box) {
          return equalizePlotRange(padRange(box, 0.08));
        }
      }
      return equalizePlotRange({ xMin: -4, xMax: 4, yMin: -4, yMax: 4 });
    }

    function resolve2dPlotRange() {
      const constraints = get2dRangeConstraints();
      if (!isAllAuto2d(constraints)) validateManual2dSpan(constraints);
      const type = document.getElementById('inputType2d').value;

      // 全自动：统一固定视口，切换曲线/类型不跳比例尺
      if (isAllAuto2d(constraints)) {
        plotRange2d = { ...VIEW_LIMITS.fixedAuto };
        const range = get2dRange();
        updateRangeHint(range, constraints);
        return range;
      }

      let range;
      if (type === 'explicit') {
        const expr = document.getElementById('expr2d').value.trim();
        if (!expr) throw new Error('请输入函数表达式');
        range = computeRangeExplicit(compileExpr(expr, ['x']), expr, constraints);
      } else if (type === 'parametric') {
        const xExpr = document.getElementById('xExpr2d').value.trim();
        const yExpr = document.getElementById('yExpr2d').value.trim();
        const { tMin, tMax } = parseParamTRange('tMin2d', 'tMax2d');
        if (!xExpr || !yExpr) throw new Error('请输入参数方程');
        range = computeRangeParametric(
          compileExpr(xExpr, ['t']), compileExpr(yExpr, ['t']),
          tMin, tMax, constraints
        );
      } else if (type === 'imageContour') {
        if (!imageContourCurve || imageContourCurve.points.length < 3) {
          throw new Error('请先上传图像并成功提取轮廓');
        }
        range = computeRangeImageContour(imageContourCurve, constraints);
      } else {
        const expr = document.getElementById('implicitExpr').value.trim();
        if (!expr) throw new Error('请输入隐式方程');
        range = computeRangeImplicit(expr, constraints);
      }

      range = finalizePlotRange(range, constraints);
      plotRange2d = range;
      updateRangeHint(range, constraints);
      return range;
    }

    function get2dRange() {
      const base = plotRange2d ? { ...plotRange2d } : { ...VIEW_LIMITS.fixedAuto };
      const constraints = get2dRangeConstraints();
      if (isAllAuto2d(constraints)) {
        return getAspectFitRange(base);
      }
      if (isFullyManual2d(constraints)) {
        return { ...base };
      }
      return fitRangeToCanvasAspect(base);
    }

    function set2dRange(r) {
      if (!r) return;
      const set = (id, v) => {
        document.getElementById(id).value = (v === null || v === undefined || v === 'auto') ? '' : v;
      };
      if ('xMin' in r) set('xMin2d', r.xMin);
      if ('xMax' in r) set('xMax2d', r.xMax);
      if ('yMin' in r) set('yMin2d', r.yMin);
      if ('yMax' in r) set('yMax2d', r.yMax);
    }

    function get3dRange() {
      const r = {
        xMin: parseFloat(document.getElementById('xMin3d').value),
        xMax: parseFloat(document.getElementById('xMax3d').value),
        yMin: parseFloat(document.getElementById('yMin3d').value),
        yMax: parseFloat(document.getElementById('yMax3d').value)
      };
      return clampDisplayRange(r, null, VIEW_LIMITS.maxSpan3d);
    }

    function set3dRange(r) {
      if (!r) return;
      if (r.xMin !== undefined) document.getElementById('xMin3d').value = r.xMin;
      if (r.xMax !== undefined) document.getElementById('xMax3d').value = r.xMax;
      if (r.yMin !== undefined) document.getElementById('yMin3d').value = r.yMin;
      if (r.yMax !== undefined) document.getElementById('yMax3d').value = r.yMax;
    }

    // ========== 会话持久化（刷新/重开保留上次绘制） ==========
    const SESSION_KEY = 'mathplot-session';
    const SESSION_VERSION = 4;
    let savedCamera3d = null;
    let saveSessionTimer = null;
    let appReady = false;

    /** 自动范围模式：固定 ±20 视口，刷新后恢复默认 1× 居中 */
    function applyAuto2dViewportDefaults() {
      if (!isAllAuto2d(get2dRangeConstraints())) return;
      plotRange2d = { ...VIEW_LIMITS.fixedAuto };
      const s = Math.max(
        VIEW_LIMITS.minScale2d,
        Math.min(VIEW_LIMITS.maxScale2d, Number(view2d.scale) || 1)
      );
      view2d = {
        offsetX: s > 1.001 ? (Number(view2d.offsetX) || 0) : 0,
        offsetY: s > 1.001 ? (Number(view2d.offsetY) || 0) : 0,
        scale: s
      };
    }

    function fieldVal(id) {
      const el = document.getElementById(id);
      return el ? el.value : '';
    }

    function setField(id, v) {
      const el = document.getElementById(id);
      if (el && v !== undefined && v !== null) el.value = v;
    }

    function collectSessionState() {
      const auto2d = isAllAuto2d(get2dRangeConstraints());
      const state = {
        v: SESSION_VERSION,
        mode: currentMode,
        view2d: auto2d
          ? {
              offsetX: view2d.scale > 1.001 ? view2d.offsetX : 0,
              offsetY: view2d.scale > 1.001 ? view2d.offsetY : 0,
              scale: view2d.scale
            }
          : { offsetX: view2d.offsetX, offsetY: view2d.offsetY, scale: view2d.scale },
        plotRange2d: auto2d
          ? { ...VIEW_LIMITS.fixedAuto }
          : (plotRange2d ? { ...plotRange2d } : null),
        panel2d: {
          type: fieldVal('inputType2d'),
          expr2d: fieldVal('expr2d'),
          xExpr2d: fieldVal('xExpr2d'),
          yExpr2d: fieldVal('yExpr2d'),
          tMin2d: fieldVal('tMin2d'),
          tMax2d: fieldVal('tMax2d'),
          implicitExpr: fieldVal('implicitExpr'),
          xMin2d: fieldVal('xMin2d'),
          xMax2d: fieldVal('xMax2d'),
          yMin2d: fieldVal('yMin2d'),
          yMax2d: fieldVal('yMax2d'),
          contourBgMode: fieldVal('contourBgMode'),
          contourThreshold: fieldVal('contourThreshold'),
          contourSimplify: fieldVal('contourSimplify'),
          imageContourCurve: imageContourCurve ? {
            points: imageContourCurve.points,
            closed: imageContourCurve.closed,
            tMin: imageContourCurve.tMin,
            tMax: imageContourCurve.tMax
          } : null,
          imageContourDataUrl: imageContourPersistUrl,
          imageContourFileName: imageContourFileName,
          imageContourLastLabel: imageContourLastLabel
        },
        panel3d: {
          type: fieldVal('inputType3d'),
          expr3d: fieldVal('expr3d'),
          xExpr3d: fieldVal('xExpr3d'),
          yExpr3d: fieldVal('yExpr3d'),
          zExpr3d: fieldVal('zExpr3d'),
          tMin3d: fieldVal('tMin3d'),
          tMax3d: fieldVal('tMax3d'),
          xUV: fieldVal('xUV'),
          yUV: fieldVal('yUV'),
          zUV: fieldVal('zUV'),
          uMin: fieldVal('uMin'),
          uMax: fieldVal('uMax'),
          vMin: fieldVal('vMin'),
          vMax: fieldVal('vMax'),
          xMin3d: fieldVal('xMin3d'),
          xMax3d: fieldVal('xMax3d'),
          yMin3d: fieldVal('yMin3d'),
          yMax3d: fieldVal('yMax3d')
        }
      };
      if (currentMode === '3d' && camera3d && controls3d) {
        state.camera3d = {
          position: camera3d.position.toArray(),
          target: controls3d.target.toArray()
        };
      }
      return state;
    }

    function saveSession() {
      if (!appReady) return;
      try {
        localStorage.setItem(SESSION_KEY, JSON.stringify(collectSessionState()));
      } catch (_) {
        try {
          const st = collectSessionState();
          if (st.panel2d) {
            st.panel2d.imageContourDataUrl = null;
          }
          localStorage.setItem(SESSION_KEY, JSON.stringify(st));
        } catch (_2) {}
      }
    }

    function scheduleSaveSession() {
      clearTimeout(saveSessionTimer);
      saveSessionTimer = setTimeout(saveSession, 500);
    }

    function applySavedCamera3d() {
      if (!savedCamera3d || !camera3d || !controls3d) return;
      camera3d.position.fromArray(savedCamera3d.position);
      controls3d.target.fromArray(savedCamera3d.target);
      const offset = new THREE.Vector3().subVectors(camera3d.position, controls3d.target);
      const dist = offset.length();
      if (dist > 1e-4) {
        const clamped = Math.min(Math.max(dist, controls3d.minDistance), controls3d.maxDistance);
        if (Math.abs(clamped - dist) > 1e-4) {
          offset.normalize().multiplyScalar(clamped);
          camera3d.position.copy(controls3d.target).add(offset);
        }
      }
      clamp3dPanTarget();
      clamp3dCameraDistance();
      controls3d.update();
      camera3d.updateProjectionMatrix();
      savedCamera3d = null;
    }

    function loadSession() {
      try {
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return false;
        const s = JSON.parse(raw);
        if (!s || s.v < 1 || s.v > SESSION_VERSION) return false;

        if (s.mode === '2d' || s.mode === '3d') currentMode = s.mode;

        const p2 = s.panel2d;
        if (p2) {
          setField('inputType2d', p2.type);
          setField('expr2d', p2.expr2d);
          setField('xExpr2d', p2.xExpr2d);
          setField('yExpr2d', p2.yExpr2d);
          setField('tMin2d', p2.tMin2d);
          setField('tMax2d', p2.tMax2d);
          setField('implicitExpr', p2.implicitExpr);
          setField('xMin2d', p2.xMin2d ?? '');
          setField('xMax2d', p2.xMax2d ?? '');
          setField('yMin2d', p2.yMin2d ?? '');
          setField('yMax2d', p2.yMax2d ?? '');
          if (p2.contourBgMode != null) setField('contourBgMode', p2.contourBgMode);
          if (p2.contourThreshold != null) {
            const tv = parseInt(p2.contourThreshold, 10);
            setField('contourThreshold', tv >= 245 ? '0' : String(p2.contourThreshold));
          }
          if (p2.contourSimplify != null) setField('contourSimplify', p2.contourSimplify);
          if (p2.imageContourLastLabel) imageContourLastLabel = p2.imageContourLastLabel;
          if (p2.imageContourCurve?.points?.length >= 3) {
            imageContourCurve = buildArcLengthCurve(
              p2.imageContourCurve.points,
              p2.imageContourCurve.closed !== false
            );
            if (imageContourCurve) {
              imageContourCurve.tMin = Number(p2.imageContourCurve.tMin) || 0;
              imageContourCurve.tMax = Number(p2.imageContourCurve.tMax) || 1;
            }
            upscaleLegacyImageContourCurve();
          }
          if (p2.imageContourDataUrl) {
            pendingImageContourRestore = {
              url: p2.imageContourDataUrl,
              name: p2.imageContourFileName || ''
            };
          }
          if (p2.type !== 'imageContour') sanitizeParametricFieldsAfterContour();
          if (p2.type === 'parametric') ensureParamTRangeDefaults(false);
        }

        const p3 = s.panel3d;
        if (p3) {
          setField('inputType3d', p3.type);
          setField('expr3d', p3.expr3d);
          setField('xExpr3d', p3.xExpr3d);
          setField('yExpr3d', p3.yExpr3d);
          setField('zExpr3d', p3.zExpr3d);
          setField('tMin3d', p3.tMin3d);
          setField('tMax3d', p3.tMax3d);
          setField('xUV', p3.xUV);
          setField('yUV', p3.yUV);
          setField('zUV', p3.zUV);
          setField('uMin', p3.uMin);
          setField('uMax', p3.uMax);
          setField('vMin', p3.vMin);
          setField('vMax', p3.vMax);
          setField('xMin3d', p3.xMin3d);
          setField('xMax3d', p3.xMax3d);
          setField('yMin3d', p3.yMin3d);
          setField('yMax3d', p3.yMax3d);
        }

        if (s.view2d) {
          view2d = {
            offsetX: Number(s.view2d.offsetX) || 0,
            offsetY: Number(s.view2d.offsetY) || 0,
            scale: Number(s.view2d.scale) || 1
          };
          clampView2dScaleOnly();
        } else {
          view2d = { offsetX: 0, offsetY: 0, scale: 1 };
        }
        if (s.plotRange2d && !isAllAuto2d(get2dRangeConstraints())) {
          plotRange2d = { ...s.plotRange2d };
        } else {
          plotRange2d = { ...VIEW_LIMITS.fixedAuto };
        }
        applyAuto2dViewportDefaults();
        savedCamera3d = s.camera3d || null;
        return true;
      } catch (_) {
        return false;
      }
    }

    function bindSessionAutosave() {
      document.querySelector('.sidebar-content').addEventListener('input', scheduleSaveSession);
      document.querySelector('.sidebar-content').addEventListener('change', scheduleSaveSession);
      window.addEventListener('beforeunload', saveSession);
    }

    // ========== 2D 坐标变换 ==========
    function getCanvasSize() {
      const dpr = window.devicePixelRatio || 1;
      const w = canvas2d.width / dpr;
      const h = canvas2d.height / dpr;
      return { w: w > 0 ? w : 1, h: h > 0 ? h : 1 };
    }

    /** 鼠标/触摸 → 画布逻辑坐标（与 backing store / dpr 一致） */
    function canvasPointerPos(e) {
      const r = canvas2d.getBoundingClientRect();
      const { w, h } = getCanvasSize();
      const cx = e.clientX ?? e.touches?.[0]?.clientX;
      const cy = e.clientY ?? e.touches?.[0]?.clientY;
      return {
        x: (cx - r.left) * (w / (r.width || w)),
        y: (cy - r.top) * (h / (r.height || h))
      };
