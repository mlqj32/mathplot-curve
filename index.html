    }

    /** 等比例坐标变换：x/y 共用 unitPx；四边手动范围时铺满画布（可平移查看裁切区） */
    function getPlotTransform(range) {
      const { w, h } = getCanvasSize();
      const xSpan = Math.max(range.xMax - range.xMin, 1e-9);
      const ySpan = Math.max(range.yMax - range.yMin, 1e-9);
      const fillCanvas = isFullyManual2d(get2dRangeConstraints());
      const unitPx = fillCanvas
        ? Math.max(w / xSpan, h / ySpan)
        : Math.min(w / xSpan, h / ySpan);
      const plotW = xSpan * unitPx;
      const plotH = ySpan * unitPx;
      return {
        w, h, unitPx, xSpan, ySpan,
        originX: (w - plotW) / 2,
        originY: (h - plotH) / 2,
        plotW, plotH,
        bounds: range
      };
    }

    function worldToScreen(wx, wy, range) {
      const t = getPlotTransform(range);
      const b = t.bounds;
      const lx = t.originX + (wx - b.xMin) * t.unitPx;
      const ly = t.originY + (b.yMax - wy) * t.unitPx;
      const cx = t.w / 2 + view2d.offsetX;
      const cy = t.h / 2 + view2d.offsetY;
      return {
        x: cx + (lx - t.w / 2) * view2d.scale,
        y: cy + (ly - t.h / 2) * view2d.scale
      };
    }

    function screenToWorld(sx, sy, range) {
      const t = getPlotTransform(range);
      const b = t.bounds;
      const cx = t.w / 2 + view2d.offsetX;
      const cy = t.h / 2 + view2d.offsetY;
      const lx = (sx - cx) / view2d.scale + t.w / 2;
      const ly = (sy - cy) / view2d.scale + t.h / 2;
      return {
        x: b.xMin + (lx - t.originX) / t.unitPx,
        y: b.yMax - (ly - t.originY) / t.unitPx
      };
    }

    /** 根据当前平移/缩放计算画布可见的世界坐标范围 */
    function getVisibleWorldBounds(range) {
      const { w, h } = getCanvasSize();
      const corners = [
        screenToWorld(0, 0, range),
        screenToWorld(w, 0, range),
        screenToWorld(0, h, range),
        screenToWorld(w, h, range)
      ];
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
      corners.forEach(c => {
        xMin = Math.min(xMin, c.x); xMax = Math.max(xMax, c.x);
        yMin = Math.min(yMin, c.y); yMax = Math.max(yMax, c.y);
      });
      const mx = (xMax - xMin) * 0.08;
      const my = (yMax - yMin) * 0.08;
      return { xMin: xMin - mx, xMax: xMax + mx, yMin: yMin - my, yMax: yMax + my };
    }

    /** 隐式方程网格密度：按像素保证足够细，避免圆/椭圆呈多边形 */
    function calcImplicitGridRes(sampleRange) {
      const { w, h } = getCanvasSize();
      const span = Math.max(sampleRange.xMax - sampleRange.xMin, 0.5);
      const byPixels = Math.floor(Math.min(w, h) / 2.5);
      const bySpan = Math.floor(span * 10);
      return Math.min(640, Math.max(180, byPixels, bySpan));
    }

    function drawWorldLine(x1, y1, x2, y2, range) {
      const p1 = worldToScreen(x1, y1, range);
      const p2 = worldToScreen(x2, y2, range);
      ctx2d.beginPath();
      ctx2d.moveTo(p1.x, p1.y);
      ctx2d.lineTo(p2.x, p2.y);
      ctx2d.stroke();
    }

    // ========== 2D 绘制 ==========
    function resizeCanvas2d() {
      const container = document.getElementById('canvasContainer');
      if (!container) return;
      const w = Math.max(1, container.clientWidth);
      const h = Math.max(1, container.clientHeight);
      const dpr = window.devicePixelRatio || 1;
      const bw = Math.round(w * dpr);
      const bh = Math.round(h * dpr);
      if (canvas2d.width !== bw || canvas2d.height !== bh) {
        canvas2d.width = bw;
        canvas2d.height = bh;
      }
      ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (currentMode === '2d') {
        clampView2d(get2dRange());
        draw2d(false);
      }
    }

    function drawGrid2d(range) {
      const { w, h } = getCanvasSize();
      const gb = range;
      const xSpan = gb.xMax - gb.xMin;
      const ySpan = gb.yMax - gb.yMin;
      const refSpan = Math.min(xSpan, ySpan);

      // 深色渐变背景
      const t = pt();
      const bgGrad = ctx2d.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*0.85);
      bgGrad.addColorStop(0, t.canvasBg[0]);
      bgGrad.addColorStop(0.6, t.canvasBg[1]);
      bgGrad.addColorStop(1, t.canvasBg[2]);
      ctx2d.fillStyle = bgGrad;
      ctx2d.fillRect(0, 0, w, h);

      // 统一步长 → 网格为正方形（主流软件做法）
      const majStep = niceStep(refSpan / 10);
      const subStep = majStep / 5;
      const xStep = majStep;
      const yStep = majStep;
      const subX = subStep;
      const subY = subStep;

      ctx2d.strokeStyle = t.gridMinor;
      ctx2d.lineWidth = 1;
      for (let x = Math.floor(gb.xMin / subX) * subX; x <= gb.xMax; x += subX) {
        drawWorldLine(x, gb.yMin, x, gb.yMax, range);
      }
      for (let y = Math.floor(gb.yMin / subY) * subY; y <= gb.yMax; y += subY) {
        drawWorldLine(gb.xMin, y, gb.xMax, y, range);
      }

      ctx2d.strokeStyle = t.gridMajor;
      for (let x = Math.floor(gb.xMin / xStep) * xStep; x <= gb.xMax; x += xStep) {
        drawWorldLine(x, gb.yMin, x, gb.yMax, range);
      }
      for (let y = Math.floor(gb.yMin / yStep) * yStep; y <= gb.yMax; y += yStep) {
        drawWorldLine(gb.xMin, y, gb.xMax, y, range);
      }

      ctx2d.shadowColor = t.axisGlow;
      ctx2d.shadowBlur = currentTheme === 'light' ? 0 : 8;
      ctx2d.lineWidth = currentTheme === 'light' ? 1.25 : 1.5;
      if (gb.xMin <= 0 && gb.xMax >= 0) {
        ctx2d.strokeStyle = t.axisX;
        drawWorldLine(0, gb.yMin, 0, gb.yMax, range);
      }
      if (gb.yMin <= 0 && gb.yMax >= 0) {
        ctx2d.strokeStyle = t.axisY;
        drawWorldLine(gb.xMin, 0, gb.xMax, 0, range);
      }
      ctx2d.shadowBlur = 0;

      const fadeGrad = ctx2d.createRadialGradient(w/2, h/2, Math.min(w,h)*0.25, w/2, h/2, Math.max(w,h)*0.72);
      fadeGrad.addColorStop(0, t.fadeFrom);
      fadeGrad.addColorStop(0.75, t.fadeFrom);
      fadeGrad.addColorStop(1, t.fadeTo);
      ctx2d.fillStyle = fadeGrad;
      ctx2d.fillRect(0, 0, w, h);

      ctx2d.fillStyle = t.label;
      ctx2d.font = '11px JetBrains Mono, Consolas, monospace';

      const xAxisY = gb.yMin <= 0 && gb.yMax >= 0 ? 0 : gb.yMin;
      const yAxisX = gb.xMin <= 0 && gb.xMax >= 0 ? 0 : gb.xMin;
      const xLblBase = worldToScreen(0, xAxisY, range);
      const xLabelY = gb.yMin <= 0 && gb.yMax >= 0
        ? Math.max(4, Math.min(h - 16, xLblBase.y + 14))
        : Math.max(4, Math.min(h - 16, worldToScreen(0, gb.yMin, range).y + 4));
      const yLabelX = gb.xMin <= 0 && gb.xMax >= 0
        ? Math.max(28, worldToScreen(0, 0, range).x - 8)
        : Math.max(28, worldToScreen(gb.xMin, 0, range).x + 4);

      ctx2d.textAlign = 'center';
      ctx2d.textBaseline = 'top';
      let lastXLbl = null;
      for (let x = Math.ceil(gb.xMin / xStep) * xStep; x <= gb.xMax + xStep * 0.001; x += xStep) {
        if (gb.xMin <= 0 && gb.xMax >= 0 && gb.yMin <= 0 && gb.yMax >= 0 && Math.abs(x) < xStep * 0.001) continue;
        const lbl = formatAxisLabel(x, xStep);
        if (lbl === lastXLbl) continue;
        lastXLbl = lbl;
        const p = worldToScreen(x, xAxisY, range);
        if (p.x >= 20 && p.x <= w - 20) {
          ctx2d.fillText(lbl, p.x, xLabelY);
        }
      }
      ctx2d.textAlign = 'right';
      ctx2d.textBaseline = 'middle';
      let lastYLbl = null;
      for (let y = Math.ceil(gb.yMin / yStep) * yStep; y <= gb.yMax + yStep * 0.001; y += yStep) {
        if (gb.xMin <= 0 && gb.xMax >= 0 && gb.yMin <= 0 && gb.yMax >= 0 && Math.abs(y) < yStep * 0.001) continue;
        const lbl = formatAxisLabel(y, yStep);
        if (lbl === lastYLbl) continue;
        lastYLbl = lbl;
        const p = worldToScreen(yAxisX, y, range);
        if (p.y >= 12 && p.y <= h - 12) {
          ctx2d.fillText(lbl, yLabelX, p.y);
        }
      }

      if (gb.xMin <= 0 && gb.xMax >= 0 && gb.yMin <= 0 && gb.yMax >= 0) {
        ctx2d.textAlign = 'right';
        ctx2d.textBaseline = 'top';
        const o = worldToScreen(0, 0, range);
        if (o.x >= 24 && o.y >= 4 && o.x <= w - 8 && o.y <= h - 8) {
          ctx2d.fillText('0', o.x - 5, o.y + 3);
        }
      }
    }

    function niceStep(rough) {
      if (!Number.isFinite(rough) || rough <= 0) return 1;
      const pow = Math.pow(10, Math.floor(Math.log10(rough)));
      const norm = rough / pow;
      if (norm < 1.5) return pow;
      if (norm < 3.5) return 2 * pow;
      if (norm < 7.5) return 5 * pow;
      return 10 * pow;
    }

    /** 坐标轴刻度：按步长保留足够精度，避免多格显示同一数值 */
    function formatAxisLabel(n, step) {
      if (!Number.isFinite(n)) return '';
      const a = Math.abs(n);
      const s = Math.abs(step) || 1;
      if (a < 1e-12) return '0';

      if (a >= 1e6 || a < 1e-4) return n.toExponential(2);

      if (a >= 1000) {
        if (s >= 500) return String(Math.round(n));
        if (s >= 50) return String(Math.round(n / 10) * 10);
        return n.toFixed(s >= 5 ? 0 : 1);
      }

      let decimals = 0;
      if (s < 1) decimals = Math.min(5, Math.max(0, Math.ceil(-Math.log10(s) - 0.05)));
      else if (s < 10) decimals = 1;
      return parseFloat(n.toFixed(decimals)).toString();
    }

    function formatNum(n) {
      if (!Number.isFinite(n)) return '—';
      const a = Math.abs(n);
      if (a >= 1e5 || a < 1e-3) return n.toExponential(2);
      if (a >= 1000) return Math.round(n).toString();
      return parseFloat(n.toFixed(2)).toString();
    }

    function strokeCurve2d() {
      const t = pt();
      ctx2d.strokeStyle = t.curve;
      ctx2d.lineWidth = currentTheme === 'light' ? 3.2 : 2.5;
      ctx2d.shadowColor = t.curveGlow;
      ctx2d.shadowBlur = currentTheme === 'light' ? 4 : 12;
      ctx2d.lineJoin = 'round';
      ctx2d.lineCap = 'round';
    }

    function finishCurve2d() {
      ctx2d.stroke();
      ctx2d.shadowBlur = 0;
    }

    function drawExplicit2d(fn, range, constraints) {
      const expr = document.getElementById('expr2d').value.trim();
      const full = getExplicitXSampleRange(range, constraints, expr);
      const vis = getVisibleWorldBounds(range);
      let xMin = Math.max(full.xMin, vis.xMin);
      let xMax = Math.min(full.xMax, vis.xMax);
      if (xMax - xMin < (full.xMax - full.xMin) * 0.02) {
        xMin = full.xMin;
        xMax = full.xMax;
      } else {
        const padX = (xMax - xMin) * 0.06;
        xMin = Math.max(full.xMin, xMin - padX);
        xMax = Math.min(full.xMax, xMax + padX);
      }
      const xSpan = Math.max(xMax - xMin, 1e-9);
      const { w, h } = getCanvasSize();
      const t = getPlotTransform(range);
      const pxPerUnitX = Math.max(t.unitPx * view2d.scale, 1e-6);
      const samples = Math.min(24000, Math.max(600, Math.ceil(xSpan * pxPerUnitX * 2.2)));
      const dx = xSpan / samples;
      const visYSpan = Math.max(vis.yMax - vis.yMin, 1e-6);
      const maxJump = visYSpan * 0.65;
      const maxScreenJump = Math.max(h * 0.42, 12);
      const subdivDepth = Math.min(14, 8 + Math.floor(Math.log2(Math.max(view2d.scale, 1))));
      const clipY = constraints.yMin != null || constraints.yMax != null;
      const yLo = constraints.yMin ?? -Infinity;
      const yHi = constraints.yMax ?? Infinity;

      strokeCurve2d();
      ctx2d.beginPath();
      let started = false;
      let prevX = null, prevY = null;
      let hadValid = false;
      let overflowX = null;
      let validCount = 0;
      const isTower = isPowerTowerExpr(expr);
      const towerLevels = isTower ? powerTowerLevels(expr) : 0;

      for (let i = 0; i <= samples; i++) {
        const x = xMin + i * dx;
        try {
          const rawY = fn({ x });
          const norm = normalizeExplicitPlotY(rawY, range, vis);
          if (!norm) {
            if (hadValid && isTower && overflowX == null) overflowX = x;
            started = false;
            prevX = prevY = null;
            continue;
          }
          const y = norm.y;
          hadValid = true;
          validCount++;
          if (clipY && (y < yLo || y > yHi)) {
            started = false;
            prevX = prevY = null;
            continue;
          }
          const p = worldToScreen(x, y, range);
          if (p.x < -80 || p.x > w + 80) {
            started = false;
            prevX = prevY = null;
            continue;
          }
          let connect = started;
          if (prevY !== null) {
            if (Math.abs(y - prevY) > maxJump) connect = false;
            const denom = Math.max(Math.abs(prevY), Math.abs(y), 1);
            if (Math.abs(y - prevY) / denom > 3.5) connect = false;
          }
          if (!connect) {
            ctx2d.moveTo(p.x, p.y);
            started = true;
          } else if (prevX !== null) {
            if (!subdivideExplicitSegment(fn, prevX, prevY, x, y, range, vis, maxScreenJump, 0, subdivDepth)) {
              ctx2d.moveTo(p.x, p.y);
            }
            started = true;
          } else {
            ctx2d.moveTo(p.x, p.y);
            started = true;
          }
          prevX = x;
          prevY = y;
        } catch (_) {
          started = false;
          prevX = prevY = null;
        }
      }
      if (validCount === 0) {
        throw new Error('表达式在 x 定义域内无有效数值（可能全为无效或未定义）');
      }
      finishCurve2d();

      if (isTower && lastPowerTowerXCap != null && hadValid) {
        const capX = lastPowerTowerXCap;
        const pTop = worldToScreen(capX, vis.yMax, range);
        const pBot = worldToScreen(capX, vis.yMin, range);
        ctx2d.save();
        ctx2d.setLineDash([5, 5]);
        ctx2d.strokeStyle = pt().curve;
        ctx2d.globalAlpha = 0.35;
        ctx2d.lineWidth = 1;
        ctx2d.beginPath();
        ctx2d.moveTo(pTop.x, pTop.y);
        ctx2d.lineTo(pBot.x, pBot.y);
        ctx2d.stroke();
        ctx2d.restore();
      }

      if (isTower && lastPowerTowerXCap != null) {
        const cap = formatNum(lastPowerTowerXCap);
        const xSpan = (constraints.xMax ?? range.xMax) - (constraints.xMin ?? range.xMin);
        if (xSpan > lastPowerTowerXCap * 8) {
          explicitPlotHint =
            `⚠ ${towerLevels}层幂塔：有效曲线仅在 x≈0～${cap}；x≥${cap} 时 y→∞。` +
            ` 当前 x 范围过宽，曲线会缩成看不见的一点，请将 x 最大改为 ${formatNum(lastPowerTowerXCap * 0.95)} 左右`;
        } else {
          explicitPlotHint =
            `⚠ ${towerLevels}层幂塔：x≥${cap} 时 y→∞，JS 无法继续计算。` +
            ` 建议 x 最大填 ${formatNum(lastPowerTowerXCap * 0.9)} 后放大查看`;
        }
      } else if (isTower && overflowX != null) {
        explicitPlotHint = `⚠ ${towerLevels}层幂塔：x≈${formatNum(overflowX)} 起 y→∞，请减小 x 范围或减层数`;
      }
    }

    function drawParametric2d(fnX, fnY, tMin, tMax, range) {
      const samples = 2000;
      const dt = (tMax - tMin) / samples;
      const ySpan = Math.max(range.yMax - range.yMin, range.xMax - range.xMin, 1e-6);
      const maxJump = ySpan * 0.4;

      strokeCurve2d();
      ctx2d.beginPath();
      let started = false;
      let prevX = null, prevY = null;

      for (let i = 0; i <= samples; i++) {
        const t = tMin + i * dt;
        try {
          const x = fnX({ t });
          const y = fnY({ t });
          if (!isFinite(x) || !isFinite(y)) { started = false; prevX = prevY = null; continue; }
          if (prevX !== null && (Math.abs(x - prevX) > maxJump || Math.abs(y - prevY) > maxJump)) {
            started = false;
          }
          const p = worldToScreen(x, y, range);
          if (!started) { ctx2d.moveTo(p.x, p.y); started = true; }
          else ctx2d.lineTo(p.x, p.y);
          prevX = x; prevY = y;
        } catch (_) { started = false; prevX = prevY = null; }
      }
      finishCurve2d();
    }

    // Marching Squares — 每格 0~2 条线段，每条 [边a, 边b]
    // 角点: 0=左下 1=右下 2=右上 3=左上; 边: 0=下 1=右 2=上 3=左
    const MS_TABLE = [
      [], [[0, 3]], [[0, 1]], [[1, 3]],
      [[1, 2]], [[0, 3], [1, 2]], [[0, 2]], [[2, 3]],
      [[2, 3]], [[0, 2]], [[0, 1], [2, 3]], [[1, 2]],
      [[1, 3]], [[0, 1]], [[0, 3]], []
    ];

    function lerp(a, b, t) { return a + (b - a) * t; }

    function msInterp(vA, vB, a, b) {
      const d = vA - vB;
      if (Math.abs(d) < 1e-12) return (a + b) / 2;
      return lerp(a, b, vA / d);
    }

    function marchingSquares(fn, sampleRange, plotRange, gridRes) {
      const cols = gridRes;
      const rows = gridRes;
      const dx = (sampleRange.xMax - sampleRange.xMin) / cols;
      const dy = (sampleRange.yMax - sampleRange.yMin) / rows;
      const vals = [];
      for (let j = 0; j <= rows; j++) {
        vals[j] = [];
        for (let i = 0; i <= cols; i++) {
          const x = sampleRange.xMin + i * dx;
          const y = sampleRange.yMin + j * dy;
          try {
            const val = fn({ x, y });
            vals[j][i] = (typeof val === 'number' && isFinite(val)) ? val : NaN;
          } catch (_) {
            vals[j][i] = NaN;
          }
        }
      }

      strokeCurve2d();

      for (let j = 0; j < rows; j++) {
        for (let i = 0; i < cols; i++) {
          const v = [
            vals[j][i], vals[j][i + 1],
            vals[j + 1][i + 1], vals[j + 1][i]
          ];
          if (v.some(n => isNaN(n))) continue;

          let idx = 0;
          if (v[0] > 0) idx |= 1;
          if (v[1] > 0) idx |= 2;
          if (v[2] > 0) idx |= 4;
          if (v[3] > 0) idx |= 8;

          const segments = MS_TABLE[idx];
          if (!segments.length) continue;

          const x0 = sampleRange.xMin + i * dx;
          const y0 = sampleRange.yMin + j * dy;
          const x1 = x0 + dx;
          const y1 = y0 + dy;

          const pts = [
            { x: msInterp(v[0], v[1], x0, x1), y: y0 },
            { x: x1, y: msInterp(v[1], v[2], y0, y1) },
            { x: msInterp(v[3], v[2], x0, x1), y: y1 },
            { x: x0, y: msInterp(v[0], v[3], y0, y1) }
          ];

          for (const seg of segments) {
            const e0 = seg[0], e1 = seg[1];
            if (pts[e0] == null || pts[e1] == null) continue;
            const pA = worldToScreen(pts[e0].x, pts[e0].y, plotRange);
            const pB = worldToScreen(pts[e1].x, pts[e1].y, plotRange);
            if (!isFinite(pA.x) || !isFinite(pA.y) || !isFinite(pB.x) || !isFinite(pB.y)) continue;
            ctx2d.beginPath();
            ctx2d.moveTo(pA.x, pA.y);
            ctx2d.lineTo(pB.x, pB.y);
            ctx2d.stroke();
          }
        }
      }
      ctx2d.shadowBlur = 0;
    }

    function rangesEqual(a, b) {
      if (!a || !b) return false;
      return a.xMin === b.xMin && a.xMax === b.xMax && a.yMin === b.yMin && a.yMax === b.yMax;
    }

    function draw2d(recomputeRange) {
      hideError();
      const constraints = get2dRangeConstraints();
      let range;
      if (recomputeRange) {
        try {
          const prevBase = plotRange2d ? { ...plotRange2d } : null;
          range = resolve2dPlotRange();
          const nextBase = plotRange2d ? { ...plotRange2d } : null;
          if (!rangesEqual(prevBase, nextBase)) {
            view2d = { offsetX: 0, offsetY: 0, scale: 1 };
          }
        } catch (err) {
          showError(err.message || String(err));
          range = get2dRange();
        }
      } else {
        range = get2dRange();
      }
      explicitPlotHint = '';
      drawGrid2d(range);

      const type = document.getElementById('inputType2d').value;
      try {
        withPlotClip(range, () => {
          if (type === 'explicit') {
            const expr = document.getElementById('expr2d').value.trim();
            if (!expr) throw new Error('请输入函数表达式');
            drawExplicit2d(compileExpr(expr, ['x']), range, constraints);
          } else if (type === 'parametric') {
            sanitizeParametricFieldsAfterContour();
            const xExpr = document.getElementById('xExpr2d').value.trim();
            const yExpr = document.getElementById('yExpr2d').value.trim();
            const { tMin, tMax } = parseParamTRange('tMin2d', 'tMax2d');
            if (!xExpr || !yExpr) throw new Error('请输入参数方程');
            drawParametric2d(
              compileExpr(xExpr, ['t']), compileExpr(yExpr, ['t']),
              tMin, tMax, range
            );
          } else if (type === 'implicit') {
            const expr = document.getElementById('implicitExpr').value.trim();
            if (!expr) throw new Error('请输入隐式方程');
            const sampleRange = getImplicitSampleRange(range, constraints);
            const gridRes = calcImplicitGridRes(sampleRange);
            marchingSquares(compileExpr(expr, ['x', 'y']), sampleRange, range, gridRes);
          } else if (type === 'imageContour') {
            if (!imageContourCurve || imageContourCurve.points.length < 3) {
              throw new Error('请先上传图像并成功提取轮廓');
            }
            drawImageContour2d(imageContourCurve, range);
          }
        });
      } catch (err) {
        showError('表达式错误: ' + (err.message || String(err)));
      }
      updateRangeHint(range, constraints);
      clampView2d(range);
      update2dHintText();
      saveSession();
    }

    // ========== 3D 场景 ==========
    function init3d() {
      if (renderer3d) return;

      scene3d = new THREE.Scene();
      const t0 = pt();
      scene3d.background = new THREE.Color(t0.sceneBg);
      scene3d.fog = new THREE.FogExp2(t0.sceneBg, 0.0016);

      const container = document.getElementById('canvasContainer');
      const w = Math.max(container.clientWidth, 1);
      const h = Math.max(container.clientHeight, 1);

      camera3d = new THREE.PerspectiveCamera(60, w / h, 0.05, 8000);
      camera3d.position.set(12, 10, 12);

      renderer3d = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true, preserveDrawingBuffer: true });
      renderer3d.setSize(w, h);
      renderer3d.setPixelRatio(window.devicePixelRatio || 1);

      controls3d = new THREE.OrbitControls(camera3d, renderer3d.domElement);
      controls3d.enableDamping = true;
      controls3d.dampingFactor = 0.08;
      controls3d.panSpeed = 0.65;
      controls3d.minDistance = 0.02;
      controls3d.maxDistance = 48;
      controls3d.addEventListener('change', scheduleSaveSession);

      scene3d.add(new THREE.AmbientLight(0x4040aa, 0.5));
      const dirLight = new THREE.DirectionalLight(0x00f0ff, 0.7);
      dirLight.position.set(5, 10, 7);
      scene3d.add(dirLight);
      const fillLight = new THREE.DirectionalLight(0xc026ff, 0.3);
      fillLight.position.set(-5, 3, -5);
      scene3d.add(fillLight);

      plotGroup3d = new THREE.Group();
      scene3d.add(plotGroup3d);

      rebuild3dFrame(get3dRange(), last3dYExtent);
      animate3d();
    }

    function animate3d() {
      animFrameId = requestAnimationFrame(animate3d);
      if (controls3d) {
        controls3d.update();
        clamp3dPanTarget();
        clamp3dCameraDistance();
      }
      if (renderer3d && scene3d && camera3d) {
        renderer3d.render(scene3d, camera3d);
      }
    }

    function clearPlot3d() {
      if (!plotGroup3d) return;
      while (plotGroup3d.children.length) {
        const obj = plotGroup3d.children[0];
        plotGroup3d.remove(obj);
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
      }
    }

    function resizeCanvas3d() {
      if (!renderer3d || !camera3d) return;
      const container = document.getElementById('canvasContainer');
      const w = Math.max(container.clientWidth, 1);
      const h = Math.max(container.clientHeight, 1);
      camera3d.aspect = w / h;
      camera3d.updateProjectionMatrix();
      renderer3d.setSize(w, h, false);
    }

    function drawSurface3d(fn, range) {
      const xMin = range.xMin, xMax = range.xMax;
      const yMin = range.yMin, yMax = range.yMax;
      const spanX = Math.max(xMax - xMin, 1e-6);
      const spanY = Math.max(yMax - yMin, 1e-6);
      const segX = Math.min(120, Math.max(48, Math.round(spanX * 8)));
      const segY = Math.min(120, Math.max(48, Math.round(spanY * 8)));
      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      const indices = [];
      const validGrid = [];
      const validZs = [];

      for (let j = 0; j <= segY; j++) {
        validGrid[j] = [];
        const y = yMin + (yMax - yMin) * j / segY;
        for (let i = 0; i <= segX; i++) {
          const x = xMin + (xMax - xMin) * i / segX;
          const z = evalSurfaceZ(fn, x, y);
          const ok = Number.isFinite(z);
          validGrid[j][i] = ok;
          if (ok) validZs.push(z);
          vertices.push(x, ok ? z : 0, y);
        }
      }

      if (validZs.length < 3) {
        throw new Error('无可绘制的实数值点（请缩小 x/y 范围或检查定义域，如 x^x 需 x > 0）');
      }

      for (let j = 0; j < segY; j++) {
        for (let i = 0; i < segX; i++) {
          const v00 = validGrid[j][i];
          const v10 = validGrid[j][i + 1];
          const v01 = validGrid[j + 1][i];
          const v11 = validGrid[j + 1][i + 1];
          const validCount = (v00 ? 1 : 0) + (v10 ? 1 : 0) + (v01 ? 1 : 0) + (v11 ? 1 : 0);
          if (validCount === 0) continue;
          const a = j * (segX + 1) + i;
          const b = a + 1;
          const c = a + segX + 1;
          const d = c + 1;
          if (validCount === 4) {
            indices.push(a, c, b, b, c, d);
          } else if (validCount >= 2) {
            if (v00 && v10 && v01) indices.push(a, c, b);
            if (v10 && v11 && v01) indices.push(b, c, d);
            if (v00 && v10 && v11) indices.push(a, b, d);
            if (v00 && v01 && v11) indices.push(a, c, d);
          }
        }
      }

      if (indices.length === 0) {
        throw new Error('曲面在定义域内无有效网格（负 x 上 x^x 无实数值）');
      }

      geometry.setIndex(indices);
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.computeVertexNormals();

      const material = new THREE.MeshPhongMaterial({
        color: pt().surface,
        emissive: pt().surfaceEm,
        side: THREE.DoubleSide,
        flatShading: false,
        shininess: 48,
        transparent: false
      });
      const mesh = new THREE.Mesh(geometry, material);
      plotGroup3d.add(mesh);

      const wireGeo = new THREE.WireframeGeometry(geometry);
      const wireMat = new THREE.LineBasicMaterial({ color: pt().wire, transparent: true, opacity: 0.08 });
      plotGroup3d.add(new THREE.LineSegments(wireGeo, wireMat));

      const xySpan = Math.max(spanX, spanY, 1);
      lastSurfaceZStats = computeRobustZExtent(validZs, xySpan);
      return lastSurfaceZStats;
    }

    function drawSurfaceParam3d(fnX, fnY, fnZ, uMin, uMax, vMin, vMax) {
      const segU = 60, segV = 60;
      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      const indices = [];

      for (let j = 0; j <= segV; j++) {
        const v = vMin + (vMax - vMin) * j / segV;
        for (let i = 0; i <= segU; i++) {
          const u = uMin + (uMax - uMin) * i / segU;
          let x, y, z;
          try {
            x = fnX({ u, v });
            y = fnY({ u, v });
            z = fnZ({ u, v });
          } catch (_) { x = y = z = 0; }
          if (!isFinite(x)) x = 0;
          if (!isFinite(y)) y = 0;
          if (!isFinite(z)) z = 0;
          vertices.push(x, z, y);
        }
      }

      for (let j = 0; j < segV; j++) {
        for (let i = 0; i < segU; i++) {
          const a = j * (segU + 1) + i;
          const b = a + 1;
          const c = a + segU + 1;
          const d = c + 1;
          indices.push(a, c, b, b, c, d);
        }
      }

      geometry.setIndex(indices);
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.computeVertexNormals();

      const material = new THREE.MeshPhongMaterial({
        color: pt().surfaceParam,
        emissive: pt().surfaceEm,
        side: THREE.DoubleSide,
        shininess: 70,
        transparent: true,
        opacity: 0.9
      });
      plotGroup3d.add(new THREE.Mesh(geometry, material));
    }

    function drawCurve3d(fnX, fnY, fnZ, tMin, tMax) {
      const samples = 2000;
      const dt = (tMax - tMin) / samples;
      const points = [];
      for (let i = 0; i <= samples; i++) {
        const t = tMin + i * dt;
        try {
          const x = fnX({ t });
          const y = fnY({ t });
          const z = fnZ({ t });
          if (isFinite(x) && isFinite(y) && isFinite(z)) {
            points.push(new THREE.Vector3(x, z, y));
          }
        } catch (_) {}
      }
      if (points.length < 2) throw new Error('曲线点数不足，请检查表达式');

      const curve = new THREE.CatmullRomCurve3(points);
      const tubeGeo = new THREE.TubeGeometry(curve, Math.min(points.length, 500), 0.06, 10, false);
      const tubeMat = new THREE.MeshPhongMaterial({ color: pt().curve3d, emissive: pt().curve3dEm, shininess: 80 });
      plotGroup3d.add(new THREE.Mesh(tubeGeo, tubeMat));

      const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
      const lineMat = new THREE.LineBasicMaterial({ color: pt().curve3dLine });
      plotGroup3d.add(new THREE.Line(lineGeo, lineMat));
    }

    function draw3d(resetCamera = true) {
      hideError();
      if (!renderer3d) init3d();
      resizeCanvas3d();
      const range = get3dRange();
      const fallbackHalf = Math.max(range.xMax - range.xMin, range.yMax - range.yMin) / 2;

      rebuild3dFrame(range, null);
      clearPlot3d();
      lastSurfaceZStats = null;

      const type = document.getElementById('inputType3d').value;
      try {
        if (type === 'surface') {
          const expr = document.getElementById('expr3d').value.trim();
          if (!expr) throw new Error('请输入曲面表达式');
          const fn = compileExpr(expr, ['x', 'y']);
          const sampleRange = get3dSurfaceRange(expr);
          drawSurface3d(fn, sampleRange);
        } else if (type === 'curve3d') {
          const xExpr = document.getElementById('xExpr3d').value.trim();
          const yExpr = document.getElementById('yExpr3d').value.trim();
          const zExpr = document.getElementById('zExpr3d').value.trim();
          const tMin = parseFloat(document.getElementById('tMin3d').value);
          const tMax = parseFloat(document.getElementById('tMax3d').value);
          if (!xExpr || !yExpr || !zExpr) throw new Error('请输入空间曲线表达式');
          drawCurve3d(
            compileExpr(xExpr, ['t']),
            compileExpr(yExpr, ['t']),
            compileExpr(zExpr, ['t']),
            tMin, tMax
          );
        } else if (type === 'surfaceParam') {
          const xUV = document.getElementById('xUV').value.trim();
          const yUV = document.getElementById('yUV').value.trim();
          const zUV = document.getElementById('zUV').value.trim();
          const uMin = parseFloat(document.getElementById('uMin').value);
          const uMax = parseFloat(document.getElementById('uMax').value);
          const vMin = parseFloat(document.getElementById('vMin').value);
          const vMax = parseFloat(document.getElementById('vMax').value);
          if (!xUV || !yUV || !zUV) throw new Error('请输入参数曲面表达式');
          drawSurfaceParam3d(
            compileExpr(xUV, ['u', 'v']),
            compileExpr(yUV, ['u', 'v']),
            compileExpr(zUV, ['u', 'v']),
            uMin, uMax, vMin, vMax
          );
        }
      } catch (err) {
        showError('表达式错误: ' + (err.message || String(err)));
      }

      const yExtent = computePlot3dYExtent(fallbackHalf, lastSurfaceZStats);
      rebuild3dFrame(range, yExtent);
      fitCamera3d(range, yExtent, { keepAngle: !resetCamera, fullReset: resetCamera });
      if (lastSurfaceZStats?.overflow) {
        showError('z 峰值约 ' + formatNum(lastSurfaceZStats.zMaxRaw) + '，已压缩视口高度以便观察；可缩小 x 范围查看细节');
      }
      saveSession();
    }

    // ========== 模式切换 ==========
    function switchMode(mode, opts = {}) {
      const restoring = opts.restore === true;
      currentMode = mode;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
      document.getElementById('panel2d').classList.toggle('active', mode === '2d');
      document.getElementById('panel3d').classList.toggle('active', mode === '3d');

      if (mode === '2d') {
        canvas2d.style.display = 'block';
        canvas3d.style.display = 'none';
        update2dHintText();
        modeBadge.textContent = 'MODE: 2D';
        canvasLabel.textContent = 'CARTESIAN · 2D';
        renderPresets(presets2D);
        presetsTitle.textContent = '◈ 2D 预设曲线库';
        resizeCanvas2d();
        draw2d(restoring ? false : true);
      } else {
        canvas2d.style.display = 'none';
        canvas3d.style.display = 'block';
        hintText.textContent = '拖拽旋转 · 滚轮放大 · 右键平移';
        modeBadge.textContent = 'MODE: 3D';
        canvasLabel.textContent = 'EUCLIDEAN · 3D';
        renderPresets(presets3D);
        presetsTitle.textContent = '◆ 3D 预设曲面/曲线库';
        init3d();
        requestAnimationFrame(() => {
          resizeCanvas3d();
          draw3d(!restoring);
          if (restoring) applySavedCamera3d();
        });
      }
      hideError();
      if (!restoring) saveSession();
    }

    // ========== 预设 ==========
    function renderPresets(presets) {
      presetsContainer.innerHTML = '';
      presets.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'preset-btn';
        btn.textContent = p.name;
        btn.addEventListener('click', () => applyPreset(p));
        presetsContainer.appendChild(btn);
      });
    }

    function applyPreset(p) {
      if (currentMode === '2d') {
        document.getElementById('inputType2d').value = p.type;
        update2dInputPanels();
        if (p.type === 'explicit') {
          document.getElementById('expr2d').value = p.expr;
        } else if (p.type === 'parametric') {
          document.getElementById('xExpr2d').value = p.xExpr;
          document.getElementById('yExpr2d').value = p.yExpr;
          document.getElementById('tMin2d').value = p.tMin;
          document.getElementById('tMax2d').value = p.tMax;
        } else if (p.type === 'implicit') {
          document.getElementById('implicitExpr').value = p.expr;
        }
        set2dRange({ xMin: null, xMax: null, yMin: null, yMax: null });
        plotRange2d = { ...VIEW_LIMITS.fixedAuto };
        draw2d(false);
      } else {
        document.getElementById('inputType3d').value = p.type;
        update3dInputPanels();
        if (p.type === 'surface') {
          document.getElementById('expr3d').value = p.expr;
        } else if (p.type === 'curve3d') {
          document.getElementById('xExpr3d').value = p.xExpr;
          document.getElementById('yExpr3d').value = p.yExpr;
          document.getElementById('zExpr3d').value = p.zExpr;
          document.getElementById('tMin3d').value = p.tMin;
          document.getElementById('tMax3d').value = p.tMax;
        } else if (p.type === 'surfaceParam') {
          document.getElementById('xUV').value = p.xUV;
          document.getElementById('yUV').value = p.yUV;
          document.getElementById('zUV').value = p.zUV;
          document.getElementById('uMin').value = p.uMin;
          document.getElementById('uMax').value = p.uMax;
          document.getElementById('vMin').value = p.vMin;
          document.getElementById('vMax').value = p.vMax;
        }
        set3dRange(p.range);
        draw3d(true);
      }
    }

    function update2dInputPanels() {
      const type = document.getElementById('inputType2d').value;
      document.getElementById('explicitInputs').style.display = type === 'explicit' ? 'block' : 'none';
      document.getElementById('parametricInputs').style.display = type === 'parametric' ? 'block' : 'none';
      document.getElementById('implicitInputs').style.display = type === 'implicit' ? 'block' : 'none';
      document.getElementById('imageContourInputs').style.display = type === 'imageContour' ? 'block' : 'none';
    }

    function update3dInputPanels() {
      const type = document.getElementById('inputType3d').value;
      document.getElementById('surfaceInputs').style.display = type === 'surface' ? 'block' : 'none';
      document.getElementById('curve3dInputs').style.display = type === 'curve3d' ? 'block' : 'none';
      document.getElementById('surfaceParamInputs').style.display = type === 'surfaceParam' ? 'block' : 'none';
    }

    // ========== 导出 PNG ==========
    function exportPNG() {
      hideError();
      if (currentMode === '2d') {
        const link = document.createElement('a');
        link.download = 'curve-2d.png';
        link.href = canvas2d.toDataURL('image/png');
        link.click();
      } else {
        if (!renderer3d) return;
        renderer3d.render(scene3d, camera3d);
        const link = document.createElement('a');
        link.download = 'curve-3d.png';
        link.href = renderer3d.domElement.toDataURL('image/png');
        link.click();
      }
    }

    // ========== 2D 交互 ==========
    canvas2d.addEventListener('mousedown', e => {
      isDragging = true;
      lastMouse = canvasPointerPos(e);
    });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', e => {
      if (!isDragging || currentMode !== '2d') return;
      const p = canvasPointerPos(e);
      view2d.offsetX += p.x - lastMouse.x;
      view2d.offsetY += p.y - lastMouse.y;
      lastMouse = p;
      clampView2d(get2dRange());
      draw2d(false);
    });
    canvas2d.addEventListener('mousemove', e => {
      if (!isDragging) return;
      e.preventDefault();
    });
    canvas2d.addEventListener('wheel', e => {
      e.preventDefault();
      const range = get2dRange();
      const pos = canvasPointerPos(e);
      const anchor = screenToWorld(pos.x, pos.y, range);
      const oldScale = view2d.scale;
      const factor = e.deltaY > 0 ? 0.9 : 1.1;
      view2d.scale = Math.max(VIEW_LIMITS.minScale2d, Math.min(VIEW_LIMITS.maxScale2d, oldScale * factor));
      const t = getPlotTransform(range);
      const lx = t.originX + (anchor.x - t.bounds.xMin) * t.unitPx;
      const ly = t.originY + (t.bounds.yMax - anchor.y) * t.unitPx;
      const { w, h } = getCanvasSize();
      view2d.offsetX = pos.x - w / 2 - (lx - w / 2) * view2d.scale;
      view2d.offsetY = pos.y - h / 2 - (ly - h / 2) * view2d.scale;
      clampView2d(range);
      draw2d(false);
    }, { passive: false });

    // 触摸支持
    let lastTouchDist = 0;
    canvas2d.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        isDragging = true;
        lastMouse = canvasPointerPos(e);
      } else if (e.touches.length === 2) {
        lastTouchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    }, { passive: true });
    canvas2d.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 1 && isDragging) {
        const p = canvasPointerPos(e);
        view2d.offsetX += p.x - lastMouse.x;
        view2d.offsetY += p.y - lastMouse.y;
        lastMouse = p;
        clampView2d(get2dRange());
        draw2d(false);
      } else if (e.touches.length === 2) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        if (lastTouchDist > 0) {
          view2d.scale *= dist / lastTouchDist;
          clampView2d(get2dRange());
          draw2d(false);
        }
        lastTouchDist = dist;
      }
    }, { passive: false });
    canvas2d.addEventListener('touchend', () => { isDragging = false; lastTouchDist = 0; });

    // ========== 事件绑定 ==========
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => switchMode(tab.dataset.mode));
    });

    document.getElementById('inputType2d').addEventListener('change', () => {
      const type = document.getElementById('inputType2d').value;
      const prevType = document.getElementById('inputType2d').dataset.prevType || '';
      update2dInputPanels();
      if (type !== 'imageContour') sanitizeParametricFieldsAfterContour();
      if (type === 'parametric') ensureParamTRangeDefaults(prevType === 'imageContour');
      document.getElementById('inputType2d').dataset.prevType = type;
      const c = get2dRangeConstraints();
      if (isAllAuto2d(c)) {
        plotRange2d = { ...VIEW_LIMITS.fixedAuto };
      }
      draw2d(false);
    });
    document.getElementById('inputType3d').addEventListener('change', update3dInputPanels);

    document.getElementById('drawBtn').addEventListener('click', () => {
      if (currentMode === '2d') draw2d(true);
      else draw3d();
    });

    document.getElementById('resetViewBtn').addEventListener('click', () => {
      if (currentMode === '2d') {
        view2d = { offsetX: 0, offsetY: 0, scale: 1 };
        plotRange2d = { ...VIEW_LIMITS.fixedAuto };
        draw2d(false);
      } else if (controls3d) {
        fitCamera3d(get3dRange(), last3dYExtent);
        saveSession();
      }
    });

    document.getElementById('exportBtn').addEventListener('click', exportPNG);

    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    document.getElementById('mobileToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
    });

    window.addEventListener('resize', () => {
      if (currentMode === '2d') resizeCanvas2d();
      else resizeCanvas3d();
    });

    if (typeof ResizeObserver !== 'undefined') {
      const canvasResizeObserver = new ResizeObserver(() => {
        if (currentMode === '2d') resizeCanvas2d();
        else if (currentMode === '3d' && renderer3d) {
          resizeCanvas3d();
          fitCamera3d(get3dRange(), last3dYExtent);
        }
      });
      const wrapperEl = document.querySelector('.canvas-wrapper');
      if (wrapperEl) canvasResizeObserver.observe(wrapperEl);
    }

    // Enter 键绘制
    document.querySelector('.sidebar-content').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (currentMode === '2d') draw2d(true);
        else draw3d();
      }
    });

    // ========== 初始化 ==========
    document.documentElement.setAttribute('data-theme', currentTheme);
    buildFormulaWatermark();
    initParticles();
    bindSessionAutosave();
    bindImageContourUI();
    const hadSession = loadSession();
    update2dInputPanels();
    update3dInputPanels();
    const finishAppInit = () => {
      if (hadSession) {
        applyAuto2dViewportDefaults();
        switchMode(currentMode, { restore: true });
        if (currentMode === '2d') {
          requestAnimationFrame(() => {
            applyAuto2dViewportDefaults();
            if (imageContourCurve) previewContourExport('parametric');
            draw2d(false);
            requestAnimationFrame(() => {
              applyAuto2dViewportDefaults();
              draw2d(false);
              appReady = true;
            });
          });
        } else {
          appReady = true;
        }
      } else {
        renderPresets(presets2D);
        view2d = { offsetX: 0, offsetY: 0, scale: 1 };
        plotRange2d = { ...VIEW_LIMITS.fixedAuto };
        resizeCanvas2d();
        requestAnimationFrame(() => {
          resizeCanvas2d();
          draw2d(false);
          appReady = true;
        });
      }
    };
    if (pendingImageContourRestore) {
      const pending = pendingImageContourRestore;
      pendingImageContourRestore = null;
      restoreImageContourFromSession(pending.url, pending.name, finishAppInit);
    } else {
      finishAppInit();
    }

  })();
  </script>
</body>
</html>
